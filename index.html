<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Collector - Gacha RPG</title>
<style>
  :root{
    --bg1:#0f0c29; --bg2:#302b63; --bg3:#24243e;
    --gold:#ffd86b; --epic:#b15bff; --rare:#5bb8ff; --common:#9fb3c8; --legend:#ff9d3a;
    --hp:#ff5d6c; --mp:#5dc8ff;
    --mythic:#ff2a6d;
    --panel:rgba(20,18,40,0.85);
    --panel2:rgba(40,35,75,0.9);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Segoe UI', 'Trebuchet MS', sans-serif;
    background:linear-gradient(160deg,var(--bg1),var(--bg2) 60%,var(--bg3));
    color:#fff; min-height:100vh; overflow-x:hidden;
  }
  #app{max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; position:relative;}

  /* TOP BAR */
  #topbar{
    display:flex; justify-content:space-between; align-items:center;
    padding:8px 12px; background:var(--panel); backdrop-filter:blur(6px);
    border-bottom:1px solid rgba(255,255,255,0.08); position:sticky; top:0; z-index:50;
  }
  .currency{display:flex; gap:10px; font-size:13px; font-weight:600;}
  .currency span{display:flex; align-items:center; gap:4px; background:rgba(0,0,0,0.25); padding:3px 8px; border-radius:12px;}
  .gem{color:#7be3ff;} .gold{color:var(--gold);} .stamina{color:#9dff9d;}
  #title{font-weight:800; font-size:15px; letter-spacing:1px; background:linear-gradient(90deg,var(--gold),#ff8de0); -webkit-background-clip:text; background-clip:text; color:transparent;}
  #autosave-indicator{
    font-size:9px; font-weight:600; padding:2px 7px; border-radius:10px;
    background:rgba(0,0,0,0.3); color:#888; border:1px solid rgba(255,255,255,0.1);
    transition:all 0.4s ease; white-space:nowrap; margin-left:4px;
  }
  #autosave-indicator.saving{color:#ffd86b; border-color:#ffd86b; background:rgba(255,216,107,0.12); animation:save-pulse 0.5s ease;}
  #autosave-indicator.saved{color:#9dff9d; border-color:#9dff9d; background:rgba(157,255,157,0.1);}
  @keyframes save-pulse{0%{transform:scale(1);}50%{transform:scale(1.1);}100%{transform:scale(1);}}

  /* MAIN CONTENT */
  #content{flex:1; padding:12px 12px 90px 12px; animation:fadein 0.25s ease;}
  @keyframes fadein{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}

  /* BOTTOM NAV */
  #navbar{
    position:fixed; bottom:0; left:0; right:0; max-width:480px; margin:0 auto;
    display:flex; background:var(--panel); border-top:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(8px); z-index:50;
  }
  .navbtn{flex:1; text-align:center; padding:10px 2px 8px; cursor:pointer; font-size:11px; color:#cfcfe8; transition:0.2s; user-select:none;}
  .navbtn .ic{font-size:20px; display:block;}
  .navbtn.active{color:var(--gold); background:rgba(255,255,255,0.06);}

  h2.section-title{font-size:16px; margin-bottom:10px; color:var(--gold); border-left:4px solid var(--gold); padding-left:8px;}

  /* CARDS GENERAL */
  .card{background:var(--panel2); border-radius:12px; padding:10px; margin-bottom:10px; border:1px solid rgba(255,255,255,0.06);}

  /* RARITY COLORS / FRAMES */
  .rarity-common{ --rc: var(--common); }
  .rarity-rare{ --rc: var(--rare); }
  .rarity-epic{ --rc: var(--epic); }
  .rarity-legendary{ --rc: var(--legend); }
  .rarity-mythic{ --rc: var(--mythic); }

  .hero-tile{
    position:relative; border-radius:10px; overflow:hidden; aspect-ratio:1/1.15;
    border:2px solid var(--rc, #888); background:linear-gradient(160deg,#1c1c34,#34304f);
    display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
    cursor:pointer; transition:transform 0.15s;
  }
  .hero-tile:active{transform:scale(0.95);}
  .hero-tile.locked{filter:grayscale(0.8) brightness(0.5); cursor:default;}
  .hero-emoji{font-size:46px; margin-top:8px;}
  .hero-name{font-size:11px; font-weight:700; text-align:center; padding:2px 4px; width:100%; background:rgba(0,0,0,0.45);}
  .hero-lvl{position:absolute; top:3px; left:3px; background:rgba(0,0,0,0.6); font-size:10px; padding:1px 5px; border-radius:8px;}
  .hero-stars{position:absolute; top:3px; right:3px; font-size:10px; color:var(--rc); font-weight:800; text-shadow:0 0 4px #000;}
  .rarity-badge{
    font-size:9px; font-weight:800; padding:1px 6px; border-radius:6px; color:#1a1a2e; text-transform:uppercase;
    background:var(--rc); display:inline-block;
  }

  /* GRID */
  .grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .grid4{display:grid; grid-template-columns:repeat(4,1fr); gap:6px;}

  /* BUTTONS */
  .btn{
    border:none; border-radius:10px; padding:10px 16px; font-weight:700; font-size:13px;
    cursor:pointer; transition:0.15s; color:#1a1a2e;
    background:linear-gradient(180deg,#ffe9a8,var(--gold));
    box-shadow:0 3px 0 #b3852f;
  }
  .btn:active{transform:translateY(2px); box-shadow:0 1px 0 #b3852f;}
  .btn.secondary{background:linear-gradient(180deg,#9adfff,var(--rare)); box-shadow:0 3px 0 #2b6fa3; color:#0a1a2e;}
  .btn.danger{background:linear-gradient(180deg,#ff9d9d,#ff5d6c); box-shadow:0 3px 0 #a32b2b;}
  .btn:disabled{opacity:0.4; cursor:not-allowed; box-shadow:none;}
  .btn-row{display:flex; gap:8px; flex-wrap:wrap;}

  /* BANNER SELECTION */
  .banner-card{
    border-radius:14px; padding:14px; margin-bottom:12px; position:relative; overflow:hidden;
    border:2px solid rgba(255,255,255,0.15); background-size:cover; background-position:center;
  }
  .banner-card.b-fire{background:linear-gradient(135deg,#ff5e62,#ff9966);}
  .banner-card.b-ice{background:linear-gradient(135deg,#4e54c8,#8f94fb);}
  .banner-card.b-nature{background:linear-gradient(135deg,#11998e,#38ef7d);}
  .banner-card.b-dark{background:linear-gradient(135deg,#3a1c71,#d76d77);}
  .banner-card.b-naruto{background:linear-gradient(135deg,#ff6b00,#ff9d3a,#ffd86b); border:2px solid #ff6b00; box-shadow:0 0 18px rgba(255,107,0,0.5);}
  .banner-card.b-madara{background:linear-gradient(135deg,#1a0010,#6b0028,#ff2a6d,#1a0010); border:2px solid #ff2a6d; box-shadow:0 0 24px rgba(255,42,109,0.7); animation:madara-glow 2s ease-in-out infinite alternate;}
  @keyframes madara-glow{from{box-shadow:0 0 18px rgba(255,42,109,0.6);}to{box-shadow:0 0 40px rgba(255,42,109,1), 0 0 60px rgba(255,42,109,0.4);}}
  .banner-card.b-onepiece{background:linear-gradient(135deg,#003b8e,#0077cc,#ffd700,#ff4500); border:2px solid #ffd700; box-shadow:0 0 22px rgba(255,215,0,0.6); animation:onepiece-glow 2s ease-in-out infinite alternate;}
  @keyframes onepiece-glow{from{box-shadow:0 0 16px rgba(255,215,0,0.5);}to{box-shadow:0 0 38px rgba(255,215,0,1), 0 0 55px rgba(255,69,0,0.4);}}
  .banner-card.b-bleach{background:linear-gradient(135deg,#0a0a1a,#1a1a3e,#4a0080,#8b00ff,#ffffff22); border:2px solid #8b00ff; box-shadow:0 0 22px rgba(139,0,255,0.7); animation:bleach-glow 2s ease-in-out infinite alternate;}
  @keyframes bleach-glow{from{box-shadow:0 0 16px rgba(139,0,255,0.5);}to{box-shadow:0 0 38px rgba(139,0,255,1), 0 0 60px rgba(255,255,255,0.2);}}
  .banner-card.b-bleach-aizen{background:linear-gradient(135deg,#0a0005,#3a0050,#7700cc,#ff00ff44,#0a0005); border:2px solid #cc00ff; box-shadow:0 0 26px rgba(204,0,255,0.8); animation:aizen-glow 2s ease-in-out infinite alternate;}
  @keyframes aizen-glow{from{box-shadow:0 0 20px rgba(204,0,255,0.6);}to{box-shadow:0 0 50px rgba(204,0,255,1), 0 0 80px rgba(139,0,255,0.5), 0 0 100px rgba(255,0,200,0.2);}}
  .banner-card.b-dragonball{background:linear-gradient(135deg,#1a0a00,#ff6600,#ffa500,#ffe066,#ffffff22); border:2px solid #ff8c00; box-shadow:0 0 22px rgba(255,140,0,0.8); animation:db-glow 2s ease-in-out infinite alternate;}
  @keyframes db-glow{from{box-shadow:0 0 16px rgba(255,140,0,0.6);}to{box-shadow:0 0 42px rgba(255,200,0,1), 0 0 65px rgba(255,100,0,0.5);}}
  .banner-card.b-demonslayer{background:linear-gradient(135deg,#0a0a14,#1a2a3a,#2d6e5c,#88e0c0,#0a0a14); border:2px solid #5fe0c0; box-shadow:0 0 22px rgba(95,224,192,0.7); animation:ds-glow 2s ease-in-out infinite alternate;}
  @keyframes ds-glow{from{box-shadow:0 0 16px rgba(95,224,192,0.5);}to{box-shadow:0 0 40px rgba(95,224,192,1), 0 0 60px rgba(255,255,255,0.3);}}
  .banner-card.b-yoriichi{background:linear-gradient(135deg,#1a0a00,#3a1a00,#ff4400,#ffee00,#ffffff); border:2px solid #ffcc00; box-shadow:0 0 28px rgba(255,180,0,0.9); animation:yoriichi-glow 2s ease-in-out infinite alternate;}
  @keyframes yoriichi-glow{from{box-shadow:0 0 20px rgba(255,180,0,0.7);}to{box-shadow:0 0 55px rgba(255,220,0,1), 0 0 85px rgba(255,80,0,0.5), 0 0 110px rgba(255,255,255,0.2);}}
  .banner-card.b-muzan{background:linear-gradient(135deg,#050005,#1a001a,#4a0033,#8b0000,#050005); border:2px solid #cc0033; box-shadow:0 0 28px rgba(180,0,50,0.9); animation:muzan-glow 2s ease-in-out infinite alternate;}
  @keyframes muzan-glow{from{box-shadow:0 0 20px rgba(180,0,50,0.7);}to{box-shadow:0 0 55px rgba(220,0,60,1), 0 0 85px rgba(100,0,30,0.6), 0 0 110px rgba(255,50,100,0.2);}}

  /* OVERLORD / AINZ STYLES */
  .banner-card.b-overlord{
    background:linear-gradient(135deg,#020008,#0a0020,#1a0040,#2a0060,#000010);
    border:2px solid #8800ff; box-shadow:0 0 28px rgba(136,0,255,0.9);
    animation:ainz-glow 2s ease-in-out infinite alternate;
  }
  @keyframes ainz-glow{
    from{box-shadow:0 0 20px rgba(100,0,200,0.7), 0 0 30px rgba(0,0,50,0.5);}
    to{box-shadow:0 0 60px rgba(136,0,255,1), 0 0 90px rgba(80,0,180,0.6), 0 0 120px rgba(50,0,100,0.3);}
  }
  .bar-shield{background:linear-gradient(90deg,#aa66ff,#6600cc);}
  .ainz-goat-card{
    background:linear-gradient(135deg,#0a0020,#1a0040); border-radius:10px;
    border:2px solid #aa66ff; padding:6px; text-align:center;
    box-shadow:0 0 10px rgba(136,0,255,0.5); margin:3px;
  }
  .ainz-raid-badge{
    font-size:9px; font-weight:800; padding:2px 6px; border-radius:6px;
    background:linear-gradient(90deg,#6600cc,#000033); color:#aa66ff;
    border:1px solid #6600cc; display:inline-block;
  }

  /* UR RARITY — ซุคุนะ */
  :root { --ur:#ff4444; }
  .rarity-ur{ --rc: var(--ur); }
  .ur-badge{
    font-size:9px; font-weight:900; padding:2px 7px; border-radius:6px;
    background:linear-gradient(90deg,#ff2200,#ff6600,#ffcc00,#ff2200);
    background-size:200% auto; animation:ur-shine 1.5s linear infinite;
    color:#1a0000; text-transform:uppercase; display:inline-block; letter-spacing:1px;
  }
  @keyframes ur-shine{to{background-position:200% center;}}

  /* UR RAINBOW BORDER — กรอบสีรุ้งพิเศษ */
  .hero-tile.rarity-ur{
    border:3px solid transparent;
    position:relative;
    animation:ur-tile-glow 2s ease-in-out infinite alternate;
  }
  .hero-tile.rarity-ur::before{
    content:'';
    position:absolute;
    inset:-3px;
    border-radius:12px;
    background:linear-gradient(
      135deg,
      #ff0000, #ff7700, #ffee00,
      #00ff44, #00cfff, #7700ff,
      #ff00cc, #ff0000
    );
    background-size:300% 300%;
    animation:ur-rainbow-border 2s linear infinite;
    z-index:0;
  }
  .hero-tile.rarity-ur::after{
    content:'';
    position:absolute;
    inset:2px;
    border-radius:9px;
    background:linear-gradient(160deg,#1c1c34,#34304f);
    z-index:1;
  }
  .hero-tile.rarity-ur > *{
    position:relative;
    z-index:2;
  }
  @keyframes ur-rainbow-border{
    0%  { background-position:0% 0%; }
    50% { background-position:100% 100%; }
    100%{ background-position:0% 0%; }
  }
  @keyframes ur-tile-glow{
    from{ box-shadow:0 0 10px 2px rgba(255,80,80,0.5), 0 0 20px 4px rgba(80,80,255,0.3); }
    to{   box-shadow:0 0 22px 5px rgba(160,0,255,0.8), 0 0 42px 8px rgba(0,200,255,0.4), 0 0 60px 10px rgba(255,0,150,0.2); }
  }

  /* UR rarity-badge: rainbow animated */
  .rarity-badge.rarity-ur{
    background:linear-gradient(90deg,#ff0000,#ff7700,#ffee00,#00ff44,#00cfff,#aa00ff,#ff00cc,#ff0000);
    background-size:300% auto;
    animation:ur-shine 1.8s linear infinite;
    color:#1a0000;
    border:1px solid rgba(255,255,255,0.3);
  }
  /* UR hero-stars: rainbow text */
  .hero-tile.rarity-ur .hero-stars{
    background:linear-gradient(90deg,#ff0000,#ff9900,#ffee00,#00ff66,#00ccff,#aa00ff,#ff00cc);
    background-size:200% auto;
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    animation:ur-shine 1.5s linear infinite;
    font-size:11px;
  }
  /* pull-card rainbow border for UR gacha result */
  .pull-card.rarity-ur{
    border:3px solid transparent;
    position:relative;
    background:linear-gradient(160deg,#1c1c34,#34304f) padding-box,
               linear-gradient(135deg,#ff0000,#ff7700,#ffee00,#00ff44,#00cfff,#aa00ff,#ff00cc,#ff0000) border-box;
    animation:ur-tile-glow 2s ease-in-out infinite alternate;
  }
  .banner-card.b-sukuna-ur{
    background:linear-gradient(135deg,#1a0000,#3a0010,#8b0000,#ff2200,#1a0000);
    border:2px solid #ff4400; box-shadow:0 0 32px rgba(255,60,0,1);
    animation:sukuna-ur-glow 2s ease-in-out infinite alternate;
  }
  @keyframes sukuna-ur-glow{
    from{box-shadow:0 0 22px rgba(255,60,0,0.8);}
    to{box-shadow:0 0 70px rgba(255,80,0,1), 0 0 100px rgba(200,0,0,0.7), 0 0 140px rgba(255,150,0,0.3);}
  }
  .sukuna-fusion-panel{
    background:linear-gradient(135deg,#1a0000,#3a0010,#5a0020);
    border-radius:14px; padding:14px; border:2px solid #ff4400;
    box-shadow:0 0 30px rgba(255,60,0,0.8); margin:16px 0;
    animation:sukuna-ur-glow 2s ease-in-out infinite alternate;
  }

  /* SUKUNA EVO3 — MAHORAGA VOID THEME */
  .banner-card.b-sukuna-evo3{
    background:linear-gradient(135deg,#000000,#0a000a,#1a0020,#2a0040,#000a00,#000000);
    border:2px solid #7700cc; box-shadow:0 0 36px rgba(80,0,200,1);
    animation:mahoraga-glow 2s ease-in-out infinite alternate;
  }
  @keyframes mahoraga-glow{
    from{box-shadow:0 0 24px rgba(80,0,200,0.8), 0 0 40px rgba(0,0,0,0.9);}
    to{box-shadow:0 0 80px rgba(120,0,255,1), 0 0 120px rgba(40,0,100,0.8), 0 0 160px rgba(200,0,255,0.3);}
  }
  .mahoraga-badge{
    font-size:9px; font-weight:900; padding:2px 8px; border-radius:6px;
    background:linear-gradient(90deg,#2a0040,#7700cc,#aa00ff,#2a0040);
    background-size:200% auto; animation:mahoraga-shine 1.5s linear infinite;
    color:#e0aaff; text-transform:uppercase; display:inline-block; letter-spacing:1px;
    border:1px solid #7700cc;
  }
  @keyframes mahoraga-shine{to{background-position:200% center;}}

  .banner-card.b-jjk{
    background:linear-gradient(135deg,#0a0010,#1a0030,#3a0060,#7700cc,#0a0010);
    border:2px solid #cc00ff; box-shadow:0 0 28px rgba(180,0,255,0.9);
    animation:jjk-glow 2s ease-in-out infinite alternate;
  }
  @keyframes jjk-glow{
    from{box-shadow:0 0 20px rgba(150,0,220,0.7), 0 0 30px rgba(0,0,50,0.5);}
    to{box-shadow:0 0 60px rgba(200,0,255,1), 0 0 90px rgba(120,0,200,0.6), 0 0 120px rgba(80,0,150,0.3);}
  }
  .banner-card.b-jjk-sukuna{
    background:linear-gradient(135deg,#1a0000,#3a0010,#8b0000,#ff2a2a,#1a0000);
    border:2px solid #ff4444; box-shadow:0 0 30px rgba(255,50,50,0.9);
    animation:sukuna-glow 2s ease-in-out infinite alternate;
  }
  @keyframes sukuna-glow{
    from{box-shadow:0 0 22px rgba(200,0,0,0.7);}
    to{box-shadow:0 0 65px rgba(255,60,60,1), 0 0 95px rgba(180,0,0,0.6), 0 0 130px rgba(255,100,100,0.3);}
  }


  /* FUSION SYSTEM */
  .fusion-panel{
    background:linear-gradient(135deg,#1a0a00,#3a1500,#5a2800); border-radius:14px; padding:14px;
    border:2px solid #ff8c00; box-shadow:0 0 20px rgba(255,140,0,0.5); margin:12px 0;
    animation:db-glow 2s ease-in-out infinite alternate;
  }
  .fusion-panel h3{color:#ffcc00; font-size:15px; margin-bottom:8px; text-shadow:0 0 8px rgba(255,200,0,0.6);}
  .fusion-slot-row{display:flex; align-items:center; justify-content:center; gap:10px; margin:10px 0;}
  .fusion-hero-box{
    width:68px; text-align:center; background:rgba(0,0,0,0.4); border-radius:10px; padding:8px 4px;
    border:2px solid rgba(255,140,0,0.4);
  }
  .fusion-hero-box.has{border-color:#ffcc00;}
  .fusion-plus{font-size:24px; color:#ffcc00; font-weight:800; text-shadow:0 0 8px #ff8c00;}
  .fusion-arrow{font-size:22px; color:#ffcc00;}
  .fusion-result-box{
    width:80px; text-align:center; background:linear-gradient(135deg,rgba(255,150,0,0.25),rgba(100,0,255,0.15));
    border-radius:10px; padding:8px 4px; border:2px solid #ffcc00;
    box-shadow:0 0 12px rgba(255,200,0,0.4);
  }
  .fusion-locked{filter:grayscale(1) brightness(0.4);}
  .mythic-plus-badge{
    font-size:9px; font-weight:800; padding:2px 6px; border-radius:6px; color:#1a1a2e; text-transform:uppercase;
    background:linear-gradient(90deg,#ffcc00,#ff8c00); display:inline-block; margin-top:2px;
  }

  /* RAID BOSS */
  .stage-item.raid{border-color:#ff2a6d; box-shadow:0 0 16px rgba(255,42,109,0.5); animation:raid-pulse 2s ease-in-out infinite alternate;}
  @keyframes raid-pulse{from{box-shadow:0 0 10px rgba(255,42,109,0.4);}to{box-shadow:0 0 25px rgba(255,42,109,0.9);}}
  .banner-card h3{font-size:16px; text-shadow:0 1px 4px #000;}
  .banner-card p{font-size:11px; opacity:0.9; margin:4px 0 10px; text-shadow:0 1px 3px #000;}
  .banner-feature{display:flex; gap:6px; margin-bottom:8px; flex-wrap:wrap;}
  .feat-emoji{font-size:28px; background:rgba(0,0,0,0.35); border-radius:50%; width:46px; height:46px; display:flex; align-items:center; justify-content:center; border:2px solid var(--legend);}

  /* STAGE LIST */
  .stage-item{
    display:flex; align-items:center; justify-content:space-between; padding:10px 12px;
    border-radius:10px; margin-bottom:8px; background:var(--panel2); border:1px solid rgba(255,255,255,0.06);
  }
  .stage-item.locked{opacity:0.45;}
  .stage-item.boss{border-color:var(--legend); box-shadow:0 0 10px rgba(255,157,58,0.3);}
  .stage-item.goldfarm{border-color:var(--gold); box-shadow:0 0 8px rgba(255,216,107,0.2);}
  .stage-item.gemfarm{border-color:#7be3ff; box-shadow:0 0 8px rgba(123,227,255,0.25);}
  .stage-stars{font-size:11px; color:var(--gold);}
  .chapter-title{font-size:13px; color:#c9c9ff; margin:14px 0 6px; opacity:0.8; text-transform:uppercase; letter-spacing:1px;}

  /* TEAM SLOTS */
  .team-slots{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px;}
  .team-slot{
    aspect-ratio:1/1.15; border-radius:10px; border:2px dashed rgba(255,255,255,0.25);
    display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:28px; color:rgba(255,255,255,0.3);
    background:rgba(0,0,0,0.2);
  }
  .team-slot.filled{border-style:solid;}

  /* MODAL */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.65); display:flex; align-items:center; justify-content:center;
    z-index:600; padding:16px; animation:fadein 0.2s;
  }
  .modal{
    background:linear-gradient(160deg,#23213d,#34304f); border-radius:16px; padding:16px; max-width:420px; width:100%;
    max-height:85vh; overflow-y:auto; border:1px solid rgba(255,255,255,0.1);
  }
  .modal h3{margin-bottom:8px; color:var(--gold);}

// คืนข้อมูลธาตุ/สกิลของซุคุนะ UR ตามขั้น EVO ปัจจุบัน (null ถ้าไม่ใช่ซุคุนะ)
function getSukunaEvoForm(unit){
  const def = heroDef(unit.heroId);
  if(!def.isSukuna || !def.evoForms) return null;
  const idx = Math.min(unit.evo||0, def.evoForms.length-1);
  return def.evoForms[idx];
}

// compute current stats for roster unit (with level + equip + form bonus)
function computeStats(unit){
  const def = heroDef(unit.heroId);
  const lvlMul = 1 + (unit.level-1)*0.08;
  const formMul = 1 + unit.form*0.15; // evolved form bonus
  let hp = Math.round(def.base.hp * lvlMul * formMul);
  let atk = Math.round(def.base.atk * lvlMul * formMul);
  let dfn = Math.round(def.base.def * lvlMul * formMul);
  let spd = Math.round(def.base.spd * (1 + (unit.level-1)*0.01));
  // equipment
  ['weapon','armor','ring'].forEach(slot=>{
    const eid = unit.equip[slot];
    if(eid){
      const e = EQUIP_DB.find(x=>x.id===eid);
      if(e.bonus.atk) atk += e.bonus.atk;
      if(e.bonus.def) dfn += e.bonus.def;
      if(e.bonus.hp) hp += e.bonus.hp;
      if(e.bonus.spd) spd += e.bonus.spd;
    }
  });
  // FUSION BONUS: if fusion hero and Goku+Vegeta both in team → +50% stats
  if(def.isFusion && hasFusionInTeam()){
    hp  = Math.round(hp  * 1.5);
    atk = Math.round(atk * 1.5);
    dfn = Math.round(dfn * 1.5);
    spd = Math.round(spd * 1.5);
  }
  // EVO BONUS (UR เท่านั้น) — แต่ละขั้น EVO เพิ่มพลังทั้งหมด +35%
  if(def.isSukuna && unit.evo > 0){
    const evoMul = 1 + unit.evo * 0.35;
    hp  = Math.round(hp  * evoMul);
    atk = Math.round(atk * evoMul);
    dfn = Math.round(dfn * evoMul);
    spd = Math.round(spd * evoMul);
  }
  return {hp, atk, def:dfn, spd, maxhp:hp, mp:0, maxmp:100};
}

function expToNext(level){ return 50 + level*30; }
// คำนวณค่าใช้จ่ายอัพ n เวล จากเลเวลปัจจุบัน
function calcLevelUpCost(fromLevel, times){
  let total = 0;
  for(let i = 0; i < times; i++) total += (fromLevel + i) * 20;
  return total;
}

const LEVEL_BREAK_CAPS = [60, 80, 100, 130, 160, 200, 550]; // ขีดจำกัดระดับแต่ละขั้น
const LEVEL_BREAK_COST = {
  60:  {gold:5000,  gem:50},
  80:  {gold:12000, gem:120},
  100: {gold:22000, gem:220},
  130: {gold:35000, gem:350},
  160: {gold:55000, gem:500},
  200: {gold:80000, gem:750},
}; // ค่าอัพ level break
function levelBreakTier(level){
  if(level < 60)  return 0;
  if(level < 80)  return 1;
  if(level < 100) return 2;
  if(level < 130) return 3;
  if(level < 160) return 4;
  if(level < 200) return 5;
  if(level < 550) return 6;
  return 7; // max
}
function levelCapForUnit(unit){
  const tier = unit.levelBreak || 0;
  return LEVEL_BREAK_CAPS[tier] || 60;
}

function openBannerPool(banner){
  const pool = banner.pool.map(id=> HERO_DB.find(h=>h.id===id)).filter(Boolean);
  const rarityGroups = {};
  for(const r of ['mythic','legendary','epic','rare','common']){ rarityGroups[r] = pool.filter(h=>h.rarity===r); }
  const baseRates = banner.mythicBanner
    ? {mythic:0.5, legendary:3, epic:12, rare:30, common:54.5}
    : {legendary:3, epic:12, rare:30, common:55};
  const rarityColors = {mythic:'var(--mythic)', legendary:'var(--legend)', epic:'var(--epic)', rare:'var(--rare)', common:'var(--common)'};
  const rarityEmoji = {mythic:'🌑', legendary:'👑', epic:'💜', rare:'💙', common:'⬜'};

  function perHeroRate(h){
    const groupSize = rarityGroups[h.rarity].length;
    if(!groupSize) return 0;
    if((h.rarity==='legendary'||h.rarity==='mythic') && banner.rateUp){
      if(banner.rateUp === h.id) return (baseRates[h.rarity] * 0.5) + (baseRates[h.rarity] * 0.5 / groupSize);
      return (baseRates[h.rarity] * 0.5) / groupSize;
    }
    return (baseRates[h.rarity]||0) / groupSize;
  }

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <span class="modal-close" id="closePool">✕</span>
      <h3>📋 ${banner.name}</h3>
      <div class="card" style="margin-bottom:10px; padding:8px;">
        <b style="font-size:12px;">อัตราโอกาสตาม Rarity</b>
        <div style="margin-top:6px; display:flex; flex-wrap:wrap; gap:6px;">
          ${Object.entries(baseRates).map(([r,w])=>`
            <div style="display:flex;align-items:center;gap:4px;background:rgba(0,0,0,0.3);padding:4px 8px;border-radius:8px;border-left:3px solid ${rarityColors[r]};">
              <span style="font-size:11px;">${rarityEmoji[r]}</span>
              <span style="font-size:11px;font-weight:700;color:${rarityColors[r]};">${RARITY[r].label}</span>
              <span style="font-size:11px;">${w}%</span>
              <span class="small-muted" style="font-size:10px;">(${rarityGroups[r].length} ตัว)</span>
            </div>
          `).join('')}
        </div>
        ${banner.rateUp ? `<div class="small-muted" style="margin-top:6px;color:var(--legend);">⭐ Rate Up: <b>${heroDef(banner.rateUp)?.name}</b> โอกาส 50% จาก Legendary ทั้งหมด</div>` : ''}
        <div class="small-muted" style="margin-top:4px;">🔒 Pity: สะสม ${state.pity[banner.id]}/50 ครั้ง</div>
      </div>
      ${['mythic','legendary','epic','rare','common'].map(r=>{
        const heroes = rarityGroups[r];
        if(!heroes.length) return '';
        return `
          <div style="margin-bottom:12px;">
            <div style="font-weight:800;font-size:12px;color:${rarityColors[r]};margin-bottom:6px;">
              ${rarityEmoji[r]} ${RARITY[r].label} — ${baseRates[r]}% รวม / ${heroes.length} ตัว
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
              ${heroes.map(h=>{
                const rate = perHeroRate(h).toFixed(2);
                const isRateUp = banner.rateUp === h.id;
                return `<div style="background:rgba(0,0,0,0.3);border-radius:8px;padding:7px 8px;border:1px solid ${isRateUp?'var(--legend)':'rgba(255,255,255,0.08)'};display:flex;align-items:center;gap:6px;">
                  <span style="font-size:22px;">${h.emoji}</span>
                  <div style="flex:1;min-width:0;">
                    <div style="font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${isRateUp?'⭐ ':''}${h.name}</div>
                    <div style="font-size:11px;color:${rarityColors[r]};">${rate}%</div>
                    <div class="small-muted" style="font-size:9px;">${h.element} • ${h.skill.name}</div>
                  </div>
                </div>`;
              }).join('')}
            </div>
          </div>`;
      }).join('')}
      <button class="btn" id="closePool2" style="width:100%;margin-top:4px;">ปิด</button>
    </div>
  `;
  document.body.appendChild(overlay);
  const close = ()=> overlay.remove();
  overlay.querySelector('#closePool').onclick = close;
  overlay.querySelector('#closePool2').onclick = close;
  overlay.onclick = e=>{ if(e.target===overlay) close(); };
}

function rollRarity(banner){
  const roll = Math.random()*100;
  let acc=0;
  // mythic only in mythic banner
  const order = banner && banner.mythicBanner
    ? ['common','rare','epic','legendary','mythic']
    : ['common','rare','epic','legendary'];
  for(const key of order){
    acc += RARITY[key].weight;
    if(roll <= acc) return key;
  }
  return 'common';
}

function doGachaPull(banner, n){
  const results = [];
  const pityMax = banner.mythicBanner ? 80 : 50;
  for(let i=0;i<n;i++){
    state.pity[banner.id]++;
    let rarity;
    if(state.pity[banner.id] >= pityMax){
      rarity = banner.mythicBanner ? 'mythic' : 'legendary';
      state.pity[banner.id] = 0;
    } else {
      rarity = rollRarity(banner);
      if(rarity==='legendary' || rarity==='mythic') state.pity[banner.id]=0;
    }
    // pick hero
    let candidates = HERO_DB.filter(h=>h.rarity===rarity && banner.pool.includes(h.id));
    if(candidates.length===0) candidates = HERO_DB.filter(h=>h.rarity===rarity);
    // fallback: mythic banner but rolled legendary, pick from pool
    if(candidates.length===0) candidates = HERO_DB.filter(h=>h.rarity==='legendary' && banner.pool.includes(h.id));
    if(candidates.length===0) candidates = HERO_DB.filter(h=>h.rarity==='legendary');
    let chosen;
    if((rarity==='legendary'||rarity==='mythic') && banner.rateUp && Math.random()<0.5){
      const rateUpHero = heroDef(banner.rateUp);
      if(rateUpHero && rateUpHero.rarity===rarity) chosen = rateUpHero;
    }
    if(!chosen) chosen = candidates[Math.floor(Math.random()*candidates.length)];
    results.push(chosen);
  }
  // add to roster / dupes
  const isNewList = [];
  results.forEach(h=>{
    let existing = state.roster.find(r=>r.heroId===h.id);
    if(existing){
      existing.dupes++;
      // every 3 dupes -> evolve form (max forms-1)
      if(existing.dupes % 3 === 0 && existing.form < h.forms.length-1){
        existing.form++;
      }
      isNewList.push(false);
    } else {
      addStarterHero(h.id, 0);
      isNewList.push(true);
    }
  });
  showGachaResultModal(results, isNewList, banner);
}

function showGachaResultModal(results, isNewList, banner){
  const overlay = document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <span class="modal-close" id="closeGacha">✕</span>
      <h3>🎉 ผลการสุ่ม - ${banner.name}</h3>
      <div id="gachaResults">
        ${results.map((h,i)=>`
          <div class="pull-card rarity-${h.rarity} ${isNewList[i]?'new':''}">
            <div class="hero-emoji">${h.emoji}</div>
            <div class="hero-name" style="font-size:9px;">${h.name}</div>
            <span class="rarity-badge rarity-${h.rarity}">${RARITY[h.rarity].label}</span>
          </div>
        `).join('')}
      </div>
      <button class="btn" id="closeGacha2" style="width:100%;">ตกลง</button>
    </div>
  `;
  document.body.appendChild(overlay);

  overlay.querySelector('#closeGacha').onclick = close;

  overlay.onclick = (e)=>{ if(e.target===overlay) close(); };
}

function findStage(id){
  for(const f of FARM_STAGES) if(f.id===id) return f;
  for(const ch of STAGES) for(const s of ch.stages) if(s.id===id) return s;
}

// ลำดับของเรทบอส (raid) ทั้งหมดตามลำดับในเกม
const RAID_ORDER = [
  "raid-madara-1","raid-madara-2",
  "raid-kaido-1","raid-kaido-2",
  "raid-aizen-1","raid-aizen-2",
  "raid-frieza-1","raid-frieza-2",
  "raid-vegito-1","raid-gogeta-1",
  "raid-yoriichi-1",
  "raid-muzan-1","raid-muzan-2",
  "raid-ainz-1","raid-ainz-2",
  "raid-mahito-1",
  "raid-sukuna-1",
  "raid-sukuna-mahoraga-1",
  "raid-mahoraga-1"
];

// คืนเรทบอสถัดไปตามลำดับ RAID_ORDER (null ถ้าเป็นเรทสุดท้ายแล้ว)
function findNextRaid(currentId){
  const idx = RAID_ORDER.indexOf(currentId);
  if(idx === -1) return null;
  if(idx+1 < RAID_ORDER.length) return findStage(RAID_ORDER[idx+1]);
  return null; // เรทสุดท้ายแล้ว ไม่มีต่อ
}

// คืน stage ถัดไปในบทเดียวกัน หรือบทถัดไป (ข้าม raid chapter)
function findNextStage(currentId){
  // หา index ใน STAGES
  for(let ci=0; ci<STAGES.length; ci++){
    const ch = STAGES[ci];
    for(let si=0; si<ch.stages.length; si++){
      if(ch.stages[si].id === currentId){
        // ด่านถัดไปในบทเดียวกัน
        if(si+1 < ch.stages.length) return ch.stages[si+1];
        // บทถัดไป (ข้ามบทที่เป็น raid ล้วน)
        for(let ci2=ci+1; ci2<STAGES.length; ci2++){
          const nonRaid = STAGES[ci2].stages.find(s=>s.type!=='raid');
          if(nonRaid) return nonRaid;
        }
        return null; // จบเกมแล้ว
      }
    }
  }
  return null; // FARM stage หรือหาไม่เจอ
}

function makeEnemy(heroId, lv){
  const def = heroDef(heroId);
  const mul = 1 + (lv-1)*0.12;
  return {
    name: def.name, emoji: def.emoji, rarity: def.rarity,
    hp: Math.round(def.base.hp*mul), maxhp: Math.round(def.base.hp*mul),
    atk: Math.round(def.base.atk*mul), def: Math.round(def.base.def*mul), spd: def.base.spd,
    skill: def.skill, mp:0, maxmp:100, isEnemy:true, alive:true, origSide:'enemy',
    isMadara: heroId==='n_madara', // มาดาระตีธรรมดาเป็นหมู่
    isAizen: heroId==='bl_aizen', // ไอเซ็นหลอกสายตาทีมศัตรู
    isIchigoBankai: heroId==='bl_ichigo_bankai', // อิจิโกะแบงไคโจมตีรวดเร็ว
    isFusion: heroId==='db_vegito'||heroId==='db_gogeta', // Fusion heroes
    isAinz: heroId==='ol_ainz', // Ainz ใช้ Goats + Shield
  };
}

function startBattle(stage, staminaCost){
  state.stamina -= (staminaCost||10);
  const playerTeamUnits = state.team.filter(Boolean).map(uid=>{
    const u = getUnit(uid);
    const stats = computeStats(u);
    const def = heroDef(u.heroId);
    const evoForm = getSukunaEvoForm(u);
    return {
      uid:u.uid, heroId:u.heroId, name: def.forms[u.form].name, emoji: def.forms[u.form].emoji, rarity:def.rarity,
      ...stats, hp:stats.hp, mp:0, maxmp:100, skill: evoForm?evoForm.skill:def.skill, skill2: evoForm?evoForm.skill2:(def.skill2||null), skill3: evoForm?(evoForm.skill3||null):(def.skill3||null),
      isEnemy:false, alive:true, origSide:'ally', level:u.level,
      isAinz: !!def.isAinz,
      isFusion: !!def.isFusion,
      shield:0, maxshield:0,
    };
  });
  const enemyUnits = stage.enemies.map(eid=>makeEnemy(eid, stage.enemyLv));

  renderBattleScreen(playerTeamUnits, enemyUnits, stage);
}

// ตรวจสอบว่าฝั่งผู้เล่น "แพ้" หรือยัง — แพ้เมื่อไม่มีตัวที่ยังมีชีวิตในทีม
// และไม่มีตัวที่ถูกมาฮิโตะขโมยออกไปค้างอยู่ (เพราะตัวนั้นจะกลับมาใน 2 เทิร์น)
function allyDefeated(allies, capturedUnits){
  return allies.every(u=>!u.alive) && capturedUnits.length===0;
}

// ลดเทิร์นของหน่วยที่ถูกมาฮิโตะขโมยมา — เมื่อครบ 2 เทิร์น จะกลับฝั่งตัวเองตามปกติ
function tickCharms(allies, capturedUnits, addLog){
  for(let i=capturedUnits.length-1; i>=0; i--){
    const entry = capturedUnits[i];
    // รองรับทั้ง format เก่า (unit ตรงๆ) และ format ใหม่ ({unit, returnTo})
    const u = entry.unit || entry;
    const returnTo = entry.returnTo || allies;
    u.charmTurnsLeft--;
    if(u.charmTurnsLeft <= 0){
      capturedUnits.splice(i,1);
      // ถอดออกจาก allyTeam ที่มาฮิโตะอยู่
      const idxA = allies.indexOf(u);
      if(idxA !== -1) allies.splice(idxA, 1);
      // คืน isEnemy กลับ
      if(u._origIsEnemy !== undefined){
        u.isEnemy = u._origIsEnemy;
        delete u._origIsEnemy;
      }
      delete u.charmed;
      delete u.charmTurnsLeft;
      // คืนกลับไปยังฝั่งเดิม
      returnTo.push(u);
      addLog(`✨ ${u.emoji} ${u.name} หลุดพ้นจาก Idle Transfiguration และกลับฝั่งตัวเองแล้ว!`);
    }
  }
}

async function runBattleLoop(allies, enemies, addLog, stage){
  addLog(`⚔️ การต่อสู้เริ่มต้น! ${stage.name}`);
  const capturedUnits = [];
  let round=0;
  while(!allyDefeated(allies,capturedUnits) && enemies.some(e=>e.alive) && round<60){
    round++;
    tickCharms(allies, capturedUnits, addLog);
    // สร้าง turn order ใหม่ทุกรอบ (รองรับแพะที่เพิ่งถูกเรียก)
    const all = [...allies, ...enemies].filter(u=>u.alive).sort((a,b)=>b.spd-a.spd);
    for(const actor of all){
      if(!actor.alive) continue;
      if(allyDefeated(allies,capturedUnits) || !enemies.some(e=>e.alive)) break;
      await sleep(220);
      doAction(actor, allies, enemies, addLog, capturedUnits);
      // วาดใหม่ทั้งหมด (รองรับกรณีแพะถูกเพิ่มเข้า allies / ตัวที่ถูกจับหายไป)
      drawUnits('allyRow', allies);
      drawUnits('enemyRow', enemies);
    }
  }
  await sleep(300);
  const win = enemies.every(e=>!e.alive);
  showBattleResult(win, stage, allies);
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

function doAction(actor, allies, enemies, addLog, capturedUnits){
  const allyTeam = actor.isEnemy ? enemies : allies;
  const enemyTeam = actor.isEnemy ? allies : enemies;
  const aliveEnemies = enemyTeam.filter(u=>u.alive);
  if(aliveEnemies.length===0) return;

  actor.mp = (actor.mp||0) + 25;
  const useSkill = actor.mp >= (actor.skill.cost||30);
  const skill = actor.skill;
  let dmgMul = useSkill ? skill.power : 1.0;
  let type = useSkill ? skill.type : (actor.isMadara ? 'madara_normal_aoe' : 'single');
  // Ainz/Sukuna: สลับสกิล 1 / 2 / 3 ทุกครั้งที่ MP เต็ม (วนรอบตามจำนวนสกิลที่มีจริง)
  const ainzHeroDef = actor.heroId ? heroDef(actor.heroId) : null;
  const hasSkill2 = ainzHeroDef && ainzHeroDef.skill2 && actor.skill2;
  const hasSkill3 = ainzHeroDef && ainzHeroDef.skill3 && actor.skill3;
  if(useSkill && hasSkill2){
    const skillCount = hasSkill3 ? 3 : 2;
    const slot = (actor._skillRotation||0) % skillCount;
    if(slot === 1){
      // ใช้สกิล 2
      const sk2 = actor.skill2;
      type = sk2.type;
      dmgMul = sk2.power;
      actor.mp += skill.cost; // refund skill1 cost ที่หักไปก่อนหน้า
      actor.mp -= (sk2.cost||80);
      addLog(`💜 ${actor.name} ใช้สกิล 2 [${sk2.name}]!`);
    } else if(slot === 2){
      // ใช้สกิล 3
      const sk3 = actor.skill3;
      type = sk3.type;
      dmgMul = sk3.power;
      actor.mp += skill.cost;
      actor.mp -= (sk3.cost||80);
      addLog(`🌀 ${actor.name} ใช้สกิล 3 [${sk3.name}]!`);
    } else {
      actor.mp -= skill.cost;
      addLog(`✨ ${actor.name} ใช้สกิล [${skill.name}]!`);
    }
    actor._skillRotation = (slot+1) % skillCount;
  } else if(useSkill){
    actor.mp -= skill.cost;
    addLog(`✨ ${actor.name} ใช้สกิล [${skill.name}]!`);
  } else if(actor.isMadara){ addLog(`🌑 มาดาระ ตีหมู่ด้วยพลังชาคระ!`); }
  else if(actor.isFusion){ addLog(`💥 ${actor.name} โจมตีด้วยพลัง Fusion!`); }

  function dealDamage(target, mul, pen=0){
    const rawAtk = actor.atk * mul;
    const eff = Math.max(1, rawAtk - target.def*(1-pen));
    const dmg = Math.round(eff * (0.9+Math.random()*0.2));
    // Shield absorbs damage first (Ainz Despair Aura)
    if(target.shield && target.shield > 0){
      if(dmg <= target.shield){
        target.shield -= dmg;
        addLog(`🛡️ เกราะแห่งความสิ้นหวังดูดซับ ${dmg} ดาเมจ! (Shield เหลือ ${Math.round(target.shield)})`);
        return dmg;
      } else {
        const remain = dmg - target.shield;
        addLog(`🛡️ เกราะแตก! ดาเมจส่วนเกิน ${Math.round(remain)} ลด HP!`);
        target.shield = 0; target.maxshield = 0;
        target.hp = Math.max(0, target.hp - remain);
      }
    } else {
      target.hp = Math.max(0, target.hp - dmg);
    }
    addLog(`${actor.emoji} ${actor.name} โจมตี ${target.emoji} ${target.name} ดาเมจ ${dmg}`);
    if(target.hp<=0 && target.alive){ target.alive=false; addLog(`💀 ${target.name} ถูกกำจัด!`); }
    return dmg;
  }
  function heal(target, mul){
    const amt = Math.round(target.maxhp*mul);
    target.hp = Math.min(target.maxhp, target.hp+amt);
    addLog(`💚 ${actor.name} ฮีล ${target.name} +${amt} HP`);
  }

  switch(type){
    case 'single': case 'single_buff': case 'single_burn': case 'single_pen': case 'single_lifesteal':{
      const target = aliveEnemies[Math.floor(Math.random()*aliveEnemies.length)];
      const pen = type==='single_pen' ? 0.3 : 0;
      const dmg = dealDamage(target, dmgMul, pen);
      if(type==='single_lifesteal'){ actor.hp = Math.min(actor.maxhp, actor.hp+Math.round(dmg*0.15)); }
      break;
    }
    case 'double':{
      for(let i=0;i<2;i++){
        const t = aliveEnemies.filter(u=>u.alive)[Math.floor(Math.random()*aliveEnemies.filter(u=>u.alive).length)] || aliveEnemies[0];
        if(t) dealDamage(t, dmgMul);
      }
      break;
    }
    case 'aoe': case 'aoe_drain':{
      let total=0;
      aliveEnemies.forEach(t=> total+=dealDamage(t, dmgMul));
      if(type==='aoe_drain'){ actor.hp=Math.min(actor.maxhp, actor.hp+Math.round(total*0.1)); }
      break;
    }
    case 'meteor_aoe':{
      // ☄️ Madara meteor: massive AoE with armor pen
      addLog(`☄️💥 อุกกาบาตพุ่งลงมาจากท้องฟ้า!!!`);
      aliveEnemies.forEach(t=> dealDamage(t, dmgMul, 0.5));
      break;
    }
    case 'madara_normal_aoe':{
      // มาดาระตีธรรมดาเป็นหมู่
      aliveEnemies.forEach(t=> dealDamage(t, 0.8));
      break;
    }
    case 'execute':{
      const t = aliveEnemies.reduce((a,b)=> a.hp<b.hp?a:b);
      dealDamage(t, dmgMul);
      break;
    }
    case 'enemy_charm':{
      // 🎭 มาฮิโตะ: ขโมยศัตรู 1 ตัวมาเป็นพวกถาวรตลอดการต่อสู้
      const candidates = aliveEnemies.filter(u=>!u.charmed);
      if(candidates.length === 0){
        addLog(`🎭 ${actor.name} พยายามแปลงจิตใจศัตรู แต่ไม่มีเป้าหมาย!`);
        break;
      }
      const target = candidates[Math.floor(Math.random()*candidates.length)];
      // ย้ายออกจาก enemyTeam ถาวร
      const idxE = enemyTeam.indexOf(target);
      if(idxE !== -1) enemyTeam.splice(idxE, 1);
      target.charmed = true;
      target.isEnemy = actor.isEnemy; // เปลี่ยนฝั่งให้เป็นฝั่งเดียวกับมาฮิโตะ
      allyTeam.push(target);
      addLog(`🎭✨ ${actor.name} ใช้ [Idle Transfiguration] ขโมย ${target.emoji} ${target.name} มาเป็นพวกถาวร!`);
      break;
    }
    // ===== AINZ SPECIAL SKILLS =====
    case 'ainz_summon_goats':{
      // เช็คจำนวนแพะที่ยังมีชีวิตอยู่ในทีม
      const existingGoats = allyTeam.filter(u=>u.isGoat && u.alive).length;
      if(existingGoats >= 3){
        // แพะครบแล้ว — โจมตีแทน
        addLog(`🐐 ลูกแพะทั้ง 3 ตัวยังอยู่ในสนาม! เอนซ์สั่งโจมตี!`);
        allyTeam.filter(u=>u.isGoat && u.alive).forEach(goat=>{
          const t = enemyTeam.filter(u=>u.alive);
          if(t.length > 0){
            const target = t[Math.floor(Math.random()*t.length)];
            const dmg = Math.max(1, Math.round(goat.atk * 1.0 * (0.9+Math.random()*0.2)));
            target.hp = Math.max(0, target.hp - dmg);
            addLog(`🐐 ${goat.name} โจมตี ${target.emoji}${target.name} ดาเมจ ${dmg.toLocaleString()}!`);
            // ดูดเลือดถ้าดาเมจมากกว่า Ainz ATK × 300%
            const ainzAtkRef = actor.atk || 220;
            if(dmg > ainzAtkRef * 3){
              const healAmt = Math.round(dmg * 0.3);
              goat.hp = Math.min(goat.maxhp, goat.hp + healAmt);
              addLog(`🩸 ${goat.name} ดูดเลือด +${healAmt.toLocaleString()} HP! (ดาเมจเกิน 300% Ainz ATK)`);
            }
            if(target.hp<=0 && target.alive){ target.alive=false; addLog(`💀 ${target.name} ถูกกำจัด!`); }

        });
        break;
      }
      // อัญเชิญแพะ 3 ตัวเข้าทีมจริง
      const ainzAtk = actor.atk || 220;
      const ainzHp  = actor.maxhp || 1200;
      const goatAtk = ainzAtk * 3;
      const goatHp  = ainzHp  * 3;
      addLog(`💀✨ ${actor.name} เปิด Gate of Death — อัญเชิญ Nazarick Goat Lords!`);
      const goatNames = ['🐐 แพะนาซาริค Alpha','🐐 แพะนาซาริค Beta','🐐 แพะนาซาริค Gamma'];
      for(let g=0;g<3;g++){
        // ตรวจว่ายังไม่มีแพะตัวนี้อยู่แล้ว
        const alreadyExists = allyTeam.some(u=>u.isGoat && u.goatIndex===g && u.alive);
        if(alreadyExists) continue;
        const goat = {
          uid: 'goat_'+g+'_'+Math.random().toString(36).slice(2,5),

          emoji: '🐐',
          rarity: 'mythic',
          hp: goatHp,
          maxhp: goatHp,
          atk: goatAtk,
          def: 0,
          spd: actor.spd - 1 - g, // เร็วรองจากเอนซ์
          mp: 0, maxmp: 100,
          skill: { name:'พุ่งชน + ดูดเลือด', power:1.2, type:'goat_lifesteal', cost:30 },

    }
    case 'goat_lifesteal':{
      // แพะดูดเลือด: โจมตีเดี่ยว + ดูดเลือดถ้าดาเมจ > Ainz ATK × 300%
      const target = aliveEnemies[Math.floor(Math.random()*aliveEnemies.length)];

      // หา Ainz ในทีม
      const ainzUnit = allyTeam.find(u=>u.isAinz && u.alive);
      const ainzAtkVal = ainzUnit ? ainzUnit.atk : 220;
      if(dmg > ainzAtkVal * 3){
        const healAmt = Math.round(dmg * 0.3);
        actor.hp = Math.min(actor.maxhp, actor.hp + healAmt);
        addLog(`🩸 ${actor.name} ดูดเลือด +${healAmt.toLocaleString()} HP! (ดาเมจเกิน 300% Ainz ATK)`);
      }
      break;
    }
    case 'ainz_team_shield':{
      // สร้างเกราะพิเศษให้ทีมทั้งหมด = 100% Ainz MaxHP
      const shieldVal = actor.maxhp || 1200;
      allyTeam.filter(u=>u.alive).forEach(u=>{
        u.shield = (u.shield||0) + shieldVal;
        u.maxshield = (u.maxshield||0) + shieldVal;
      });
      addLog(`🛡️ ${actor.name} สร้างเกราะ [Despair Aura V] ให้ทีมทั้งหมด! Shield +${shieldVal.toLocaleString()} HP ต่อคน!`);
      break;
    }
    case 'heal_single':{
      const aliveAllies = allyTeam.filter(u=>u.alive);
      const t = aliveAllies.reduce((a,b)=> a.hp/a.maxhp < b.hp/b.maxhp ? a:b);
      heal(t, dmgMul);
      break;
    }
    case 'heal_all': case 'heal_all_buff':{
      allyTeam.filter(u=>u.alive).forEach(t=>heal(t, dmgMul));
      break;
    }
    // ===== SUKUNA UR EVO SKILLS (ไฟ / แสง) =====
    case 'single_pen_burn':{

    }
    case 'double_meteor_aoe':{

      aliveEnemies.forEach(t=> dealDamage(t, dmgMul, 0.9));
      aliveEnemies.filter(u=>u.alive).forEach(t=> dealDamage(t, dmgMul, 0.9));
      break;
    }
    case 'light_team_heal_buff':{
      // EVO2 แสง — Resurrection: ฮีลทีมทั้งหมด + เกราะป้องกัน Instant Kill (จำลองด้วย Shield)
      allyTeam.filter(u=>u.alive).forEach(t=>{
        heal(t, dmgMul*0.1);
        t.shield = (t.shield||0) + Math.round(t.maxhp*0.2);
        t.maxshield = (t.maxshield||0) + Math.round(t.maxhp*0.2);
      });
      addLog(`✨💫 ${actor.name} ปลดปล่อยรังสีฟื้นคืนชีพ! ทีมทั้งหมดได้รับการฮีลและเกราะป้องกัน!`);
      break;
    }
    // ===== SUKUNA EVO3 — MAHORAGA SUMMON =====
    case 'sukuna_mahoraga_summon':{
      // ตรวจว่ามโหรากาอยู่ในทีมแล้วหรือยัง
      const existingMahoraga = allyTeam.find(u=>u.isMahoraga && u.alive);

        addLog(`🌀⚫ มโหรากาตอบรับคำสั่งราชา! Wheel of Adaptation หมุน!!!`);
        aliveEnemies.forEach(t=>{
          t.shield = 0; t.maxshield = 0; // ทำลาย Shield ก่อน
          dealDamage(t, dmgMul, 1.0);
        });
      } else {
        // อัญเชิญมโหรากาเข้าสู่สนาม
        const sukunaAtk = actor.atk || 300;
        const sukunaHp  = actor.maxhp || 1800;
        const mahoragaAtk = Math.round(sukunaAtk * 4.0);
        const mahoragaHp  = Math.round(sukunaHp  * 3.5);

        addLog(`🐉 Eight-Handled Sword Divergent Sila Divine General — Mahoraga ปรากฏตัว!!!`);
        // ทำลาย Shield ศัตรูทั้งหมดก่อน
        aliveEnemies.forEach(t=>{ t.shield=0; t.maxshield=0; });
        // โจมตีหมู่ก่อน 1 รอบ
        aliveEnemies.forEach(t=> dealDamage(t, dmgMul, 1.0));
        const mahoraga = {
          uid: 'mahoraga_'+Math.random().toString(36).slice(2,5),
          name: '🐉 Divine General Mahoraga',
          emoji: '🐉',
          rarity: 'ur',
          hp: mahoragaHp,
          maxhp: mahoragaHp,
          atk: mahoragaAtk,
          def: 9999,
          spd: actor.spd + 2,
          mp: 0, maxmp: 100,
          skill:{ name:'Wheel of Adaptation', power:3.0, type:'mahoraga_wheel', cost:40 },
          isEnemy: false,
          alive: true,
          origSide: 'ally',
          isMahoraga: true,
          shield: 0, maxshield: 0,

        allyTeam.push(mahoraga);
        addLog(`🐉 Mahoraga เข้าร่วมสนาม! HP ${mahoragaHp.toLocaleString()} | ATK ${mahoragaAtk.toLocaleString()} | DEF ∞ (Adaptation)`);
      }
      break;
    }
    case 'mahoraga_passive_aoe':{
      // EVO3 สกิล 2 — Mahoraga Adaptation: ลด DEF ศัตรูทั้งหมด + AoE
      addLog(`🌀 Wheel of Adaptation หมุน! DEF ศัตรูทั้งหมดพังทลาย!!!`);
      aliveEnemies.forEach(t=>{
        t.shield = 0; t.maxshield = 0;
        dealDamage(t, dmgMul, 1.0);
      });
      // ฟื้นฟู HP ซุคุนะ
      const healAmt = Math.round(actor.maxhp * 0.25);
      actor.hp = Math.min(actor.maxhp, actor.hp + healAmt);
      addLog(`💉 ซุคุนะฟื้นฟู HP +${healAmt.toLocaleString()} จากพลังมโหรากา!`);
      break;
    }
    case 'mahoraga_wheel':{
      // มโหรากาใช้สกิล Wheel of Adaptation — โจมตี AoE แบบทะลวงเกราะ
      addLog(`🐉🌀 Wheel of Adaptation — มโหรากาหมุนล้อสังหาร!!!`);
      aliveEnemies.forEach(t=>{
        t.shield = 0; t.maxshield = 0;
        dealDamage(t, dmgMul, 1.0);
      });
      break;
    }
    case 'sukuna_domain_collapse':{
      // EVO3 สกิล 3 — Domain Collapse: AoE เจาะเกราะเต็ม + Instant Kill
      addLog(`🌑💥 Domain Collapse — ศาลเจ้าผนึกมิติล่มสลายทับศัตรูทั้งสนาม!!!`);
      aliveEnemies.forEach(t=>{
        t.shield = 0; t.maxshield = 0;
        dealDamage(t, dmgMul, 1.0);
        if(Math.random() < 0.4 && t.hp > 0){
          t.hp = 0; t.alive = false;
          addLog(`☠️ ${t.name} ถูกทำลายล้างจากมิติที่ล่มสลาย! (Instant Kill)`);
        }
      });
      break;
    }
    default:{
      const target = aliveEnemies[Math.floor(Math.random()*aliveEnemies.length)];
      dealDamage(target, 1.0);
    }
  }
}

/* ============================================================
   FAST BATTLE SIMULATION (ใช้สำหรับ Auto-Replay ไม่มี animation)
   ============================================================ */
function simulateBattleFast(stage, staminaCost){
  state.stamina -= (staminaCost||10);

  const allies = state.team.filter(Boolean).map(uid=>{
    const u = getUnit(uid);
    const stats = computeStats(u);
    const def = heroDef(u.heroId);
    const evoForm = getSukunaEvoForm(u);
    return {
      heroId:u.heroId, name: def.forms[u.form].name, emoji: def.forms[u.form].emoji,
      ...stats, hp:stats.hp, mp:0, maxmp:100, skill: evoForm?evoForm.skill:def.skill, skill2: evoForm?evoForm.skill2:(def.skill2||null), skill3: evoForm?(evoForm.skill3||null):(def.skill3||null),
      isEnemy:false, alive:true, origSide:'ally', isAinz:!!def.isAinz, isFusion:!!def.isFusion,
      shield:0, maxshield:0,
    };
  });
  const enemies = stage.enemies.map(eid=>makeEnemy(eid, stage.enemyLv));

  // จำลอง battle loop สูงสุด 60 รอบ (รองรับแพะที่ join กลางเกม)
  const capturedUnits = [];
  let round=0;
  while(!allyDefeated(allies,capturedUnits) && enemies.some(e=>e.alive) && round<60){
    round++;
    tickCharms(allies, capturedUnits, ()=>{});
    // สร้าง turn order ใหม่ทุกรอบ รองรับแพะที่อาจถูก push เข้า allies
    const all = [...allies, ...enemies].filter(u=>u.alive).sort((a,b)=>b.spd-a.spd);
    for(const actor of all){
      if(!actor.alive) continue;
      if(allyDefeated(allies,capturedUnits) || !enemies.some(e=>e.alive)) break;
      doAction(actor, allies, enemies, ()=>{}, capturedUnits); // noop log
    }
  }

  const win = enemies.every(e=>!e.alive);
  if(!win) return { win:false };

  const goldGain = stage.reward.gold;
  const gemGain  = stage.reward.gem||0;
  const expGain  = stage.reward.exp;

  const equipDropChance = stage.type==='boss' ? 1.0 : 0.6;
  let drop = null;
  if(Math.random() < equipDropChance){
    const normalEquip = EQUIP_DB.filter(e=>!e.isAinzDrop && !e.isDiamond && !e.isSukunaFinger);
    drop = normalEquip[Math.floor(Math.random()*normalEquip.length)];
  }

  const RAID_DIAMOND_MAP_FAST = {
    'raid-madara-1':'diamond_red','raid-madara-2':'diamond_red',
    'raid-kaido-1':'diamond_orange','raid-kaido-2':'diamond_orange',
    'raid-aizen-1':'diamond_yellow','raid-aizen-2':'diamond_yellow',
    'raid-muzan-1':'diamond_blue','raid-muzan-2':'diamond_blue',
    'raid-yoriichi-1':'diamond_green',
    'raid-vegito-1':'diamond_indigo','raid-gogeta-1':'diamond_indigo',
  };
  let heroDropped = false;
  if((stage.type==='boss'||stage.type==='raid') && stage.bossRate && Math.random()<stage.bossRate){
    if(stage.isAinzRaid) heroDropped = 'ainz_item';
    else if(stage.id === 'raid-sukuna-1') heroDropped = 'sukuna_finger';
    else if(stage.isMahoragaRaid){
      // ด่านมโหรากา: สุ่มระหว่าง ล้อมโหรากา กับ ตัวมโหรากา UR
      heroDropped = Math.random() < 0.5 ? 'mahoraga_hero' : 'mahoraga_wheel';
    }
    else if(RAID_DIAMOND_MAP_FAST[stage.id]) heroDropped = RAID_DIAMOND_MAP_FAST[stage.id];
    else heroDropped = true;
  }

  state.clearedStages[stage.id] = true;
  return { win:true, gold:goldGain, gem:gemGain, exp:expGain, drop, heroDropped };
}

function showBattleResult(win, stage, allies){
  // restore HP for next time (simulate rest)
  let expGain = stage.reward.exp;
  let goldGain = stage.reward.gold;
  let gemGain = stage.reward.gem||0;

  if(win){
    state.clearedStages[stage.id]=true;
    state.gold += goldGain;
    state.gem += gemGain;
    // give EXP to team
    state.team.filter(Boolean).forEach(uid=>{
      const u = getUnit(uid);
      const cap = levelCapForUnit(u);
      if(u.level >= cap) return; // หยุดได้รับ EXP เมื่อถึงขีดจำกัด
      u.exp += expGain;
      while(u.exp >= expToNext(u.level) && u.level < cap){
        u.exp -= expToNext(u.level);
        u.level++;
      }
      if(u.level >= cap) u.exp = 0; // รีเซ็ต EXP ที่ขีดจำกัด
    });
    // chance to drop equipment (60% ปกติ, 100% บอส)
    let dropEquip = null;
    const equipDropChance = stage.type === 'boss' ? 1.0 : 0.6;
    if(Math.random() < equipDropChance){
      // ยกเว้น Ainz item จาก random drop ปกติ — ดรอปเฉพาะ raid
      const normalEquip = EQUIP_DB.filter(e=>!e.isAinzDrop && !e.isDiamond && !e.isSukunaFinger);
      dropEquip = normalEquip[Math.floor(Math.random()*normalEquip.length)];
      state.inventory[dropEquip.id] = (state.inventory[dropEquip.id]||0)+1;
    }
    // boss stages have a chance to drop a bonus hero shard/unit
    let bossHero = null;
    // เพชร 7 สี ดรอปจากเรทบอสต่างๆ
    const RAID_DIAMOND_MAP = {
      'raid-madara-1':  'diamond_red',
      'raid-madara-2':  'diamond_red',
      'raid-kaido-1':   'diamond_orange',
      'raid-kaido-2':   'diamond_orange',
      'raid-aizen-1':   'diamond_yellow',
      'raid-aizen-2':   'diamond_yellow',
      'raid-muzan-1':   'diamond_blue',
      'raid-muzan-2':   'diamond_blue',
      'raid-yoriichi-1':'diamond_green',
      'raid-vegito-1':  'diamond_indigo',
      'raid-gogeta-1':  'diamond_indigo',
    };
    // Vegito/Gogeta fusion raids → เพชรคราม
    // Yoriichi → เพชรเขียว
    // Ainz raid → เพชรม่วง + คทา
    if((stage.type==='boss'||stage.type==='raid') && stage.bossRate && Math.random()<stage.bossRate){
      // Ainz Raid drops "คทา" item + เพชรม่วง
      if(stage.isAinzRaid){
        state.inventory['ainz_killer_shard'] = (state.inventory['ainz_killer_shard']||0)+1;
        state.inventory['diamond_violet'] = (state.inventory['diamond_violet']||0)+1;
        bossHero = {name:"คทาแห่งความตาย + เพชรม่วง", emoji:"🔱💀🔮💎", rarity:"mythic", isAinzItem:true};
      } else if(stage.id === 'raid-sukuna-1'){
        // ดรอป 🩸 นิ้วซุคุนะ — วัตถุดิบ EVO ซุคุนะ UR
        state.inventory['sukuna_finger'] = (state.inventory['sukuna_finger']||0)+1;
        bossHero = {name:"🩸 นิ้วซุคุนะ", emoji:"🩸👹", rarity:'mythic', isSukunaFingerDrop:true};
      } else if(stage.isMahoragaRaid){
        // ด่านมโหรากา — สุ่มระหว่างล้อมโหรากา กับ ตัว UR
        if(Math.random() < 0.5){
          // ดรอปตัวมโหรากา UR
          const mhDef = heroDef('jjk_mahoraga');
          const existing = state.roster.find(r=>r.heroId==='jjk_mahoraga');
          if(existing){
            existing.dupes++;
            if(existing.dupes % 3 === 0 && existing.form < mhDef.forms.length-1) existing.form++;
          } else {
            addStarterHero('jjk_mahoraga', 0);
          }
          bossHero = {name:"🐉⚙️ มโหรากา UR — ปลดล็อกสำเร็จ!", emoji:"🐉⚙️🌀", rarity:'ur', isMahoragaDrop:true};
        } else {
          // ดรอปล้อมโหรากา (วัตถุดิบ EVO3)
          state.inventory['mahoraga_wheel'] = (state.inventory['mahoraga_wheel']||0)+1;
          bossHero = {name:"⚙️ ล้อมโหรากา — Wheel of Adaptation", emoji:"⚙️🌀🐉", rarity:'mythic', isMahorakaWheelDrop:true};
        }
      } else {
        // ดรอปเพชรสีตาม RAID_DIAMOND_MAP
        const diamondId = RAID_DIAMOND_MAP[stage.id];
        if(diamondId){
          const diamondDef = EQUIP_DB.find(e=>e.id===diamondId);
          state.inventory[diamondId] = (state.inventory[diamondId]||0)+1;
          bossHero = {name: diamondDef.name, emoji: diamondDef.emoji, rarity:'mythic', isDiamondDrop:true, diamondId};
        } else {
          const bossDef = heroDef(stage.enemies[0]);
          bossHero = bossDef;
          let existing = state.roster.find(r=>r.heroId===bossDef.id);
          if(existing){
            existing.dupes++;
            if(existing.dupes % 3 === 0 && existing.form < bossDef.forms.length-1) existing.form++;
          } else {
            addStarterHero(bossDef.id, 0);
          }
        }
      }
    }

    const nextStage = stage.type==='raid' ? findNextRaid(stage.id) : findNextStage(stage.id);
    const staminaCostNext = nextStage && nextStage.type==='raid' ? 30 : 10;
    const canGoNext = nextStage && state.stamina >= staminaCostNext;

    const staminaCost = stage.type==='raid' ? 30 : 10;
    const canReplay = state.stamina >= staminaCost;

    const overlay = document.createElement('div');
    overlay.className='modal-overlay';
    overlay.innerHTML = `
      <div class="modal" style="text-align:center;">
        <h3>🎉 ชนะ!</h3>
        <div style="font-size:48px;">🏆</div>
        <p>ได้รับ: 🪙 ${goldGain} ${gemGain?('• 💎 '+gemGain):''} • EXP ${expGain} (ทุกคนในทีม)</p>
        ${dropEquip?`<p>🎁 ดรอปไอเทม: ${dropEquip.emoji} ${dropEquip.name} <span style="color:#9dff9d;">(เข้าคลังแล้ว ✓)</span></p>`:''}
        ${bossHero?`<p style="color:#bb88ff; font-weight:800;">${bossHero.isAinzItem?'🔱💀 ดรอปพิเศษ!! ':bossHero.isDiamondDrop?'💎 เพชรดรอปพิเศษ!! ':bossHero.isMahoragaDrop?'🐉⚙️ UR มโหรากาดรอป!!! ':bossHero.isMahorakaWheelDrop?'⚙️ ล้อมโหรากาดรอป!! ':bossHero.rarity==='ur'?'🌀⚫ UR ดรอปตำนาน!!! ':bossHero.rarity==='mythic'?'🌑☄️ ดรอปตำนาน!! ':'🌟 บอสดรอปฮีโร่: '}${bossHero.emoji} ${bossHero.name}${bossHero.isAinzItem?' เข้าคลังแล้ว! (ใช้ Fusion เอนซ์ได้เลย 🔱)':bossHero.isDiamondDrop?' เข้าคลังแล้ว! (รวบรวมครบ 7 สี → Fusion เอนซ์!)':bossHero.isMahoragaDrop?' เข้าคลังแล้ว! (ใช้ EVO3 ซุคุนะ UR ได้เลย! 🌀⚫)':bossHero.isMahorakaWheelDrop?' เข้าคลังแล้ว! (วัตถุดิบ EVO3 ซุคุนะ UR 🔓)':bossHero.rarity==='mythic'?' ★★★★★ เข้าคลังแล้ว!':'!'}</p>`:''}
        ${stage.type==='raid' && !bossHero?`<p class="small-muted" style="color:#888;">💨 บอสหลบหนีไป... (โอกาส ${Math.round((stage.bossRate||0)*100)}%) ลองใหม่อีกครั้ง!</p>`:''}

        <!-- AUTO-REPLAY SECTION -->
        <div class="auto-replay-box">
          <h4>🔁 ออโต้เล่นอีกครั้ง</h4>
          <div class="repeat-selector">
            <button id="arMinus">−</button>
            <span id="arCount">3</span>
            <button id="arPlus">+</button>
            <span style="font-size:11px; color:#aaa; margin-left:4px;">ครั้ง</span>
          </div>
          <div style="display:flex; gap:6px; justify-content:center; margin-bottom:6px;">
            <button class="btn secondary" style="font-size:11px; padding:5px 10px;" data-arset="3">3ครั้ง</button>
            <button class="btn secondary" style="font-size:11px; padding:5px 10px;" data-arset="5">5ครั้ง</button>
            <button class="btn secondary" style="font-size:11px; padding:5px 10px;" data-arset="10">10ครั้ง</button>
            <button class="btn secondary" style="font-size:11px; padding:5px 10px;" data-arset="20">20ครั้ง</button>
          </div>
          <div class="auto-replay-progress" id="arProgress">
            <div style="color:#7be3ff; font-size:12px; margin-bottom:4px;">กำลังเล่นซ้ำ... <span id="arRound">0</span>/<span id="arTotal">0</span></div>
            <div class="auto-replay-bar-bg"><div class="auto-replay-bar-fill" id="arBarFill" style="width:0%"></div></div>
            <div class="auto-replay-stat">
              <span>🪙 <span id="arGold">0</span></span>
              <span>💎 <span id="arGem">0</span></span>
              <span>⭐ EXP <span id="arExp">0</span></span>
              <span>🎁 ไอเทม <span id="arDrop">0</span></span>
            </div>
            ${stage.bossRate ? `<div class="auto-replay-stat" style="margin-top:4px;"><span>🌟 ฮีโร่บอสดรอป: <span id="arHero">0</span> ครั้ง</span></div>` : ''}
          </div>
          <button class="btn" id="autoReplayBtn" ${!canReplay?'disabled':''} style="width:100%; margin-top:4px;">
            🔁 เริ่มออโต้เล่นอีกครั้ง ${!canReplay?`(พลังกายไม่พอ ${staminaCost}⚡)`:''}
          </button>
        </div>

        ${nextStage ? `
        <div style="background:rgba(0,0,0,0.3);padding:8px;border-radius:10px;margin:10px 0;border:1px solid rgba(255,255,255,0.1);">
          <div class="small-muted" style="margin-bottom:6px;">ด่านถัดไป: ${nextStage.name}</div>
          <div class="small-muted" style="margin-bottom:8px;">⚡ ${staminaCostNext} พลังกาย${!canGoNext?' (พลังกายไม่พอ)':''}</div>
          <button class="btn" id="nextStageBtn" ${!canGoNext?'disabled style="opacity:0.4;"':''}>⚔️ ต่อสู้ด่านต่อไป</button>
        </div>` : `<p class="small-muted" style="color:#ffd700;margin:8px 0;">🎊 คุณผ่านทุกด่านแล้ว! ยอดเยี่ยมมาก!</p>`}
        <button class="btn secondary" id="resultClose" style="margin-top:6px;">กลับหน้าด่าน</button>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.querySelector('#resultClose').onclick = ()=>{ overlay.remove(); activeTab='stages'; render(); };
    if(nextStage && canGoNext){
      overlay.querySelector('#nextStageBtn').onclick = ()=>{
        overlay.remove();
        startBattle(nextStage, staminaCostNext);
      };
    }

    // --- AUTO REPLAY LOGIC ---
    let arRepeatCount = 3;
    let arRunning = false;
    let arStopping = false;

    const arCountEl   = overlay.querySelector('#arCount');
    const arPlusBtn   = overlay.querySelector('#arPlus');
    const arMinusBtn  = overlay.querySelector('#arMinus');
    const arBtn       = overlay.querySelector('#autoReplayBtn');
    const arProgress  = overlay.querySelector('#arProgress');

    const updateArCount = ()=> { arCountEl.textContent = arRepeatCount; };
    arPlusBtn.onclick  = ()=>{ if(!arRunning){ arRepeatCount = Math.min(50, arRepeatCount+1); updateArCount(); }};
    arMinusBtn.onclick = ()=>{ if(!arRunning){ arRepeatCount = Math.max(1, arRepeatCount-1); updateArCount(); }};
    overlay.querySelectorAll('[data-arset]').forEach(btn=>{
      btn.onclick = ()=>{ if(!arRunning){ arRepeatCount = parseInt(btn.dataset.arset); updateArCount(); }};
    });

    arBtn.onclick = async ()=>{
      if(arRunning){
        // ปุ่มกด "หยุด" ขณะกำลังรัน
        arStopping = true;
        arBtn.textContent = '⏸️ กำลังหยุด...';
        arBtn.disabled = true;
        return;
      }
      arRunning = true;
      arStopping = false;
      arBtn.classList.add('running');
      arBtn.textContent = '⏹️ หยุด';
      arProgress.classList.add('show');

      // ล็อคปุ่มอื่น
      overlay.querySelectorAll('#resultClose, #nextStageBtn, #arPlus, #arMinus, [data-arset]').forEach(b=>b.disabled=true);

      let totalGold=0, totalGem=0, totalExp=0, totalDrop=0, totalHero=0;
      const totalRuns = arRepeatCount;

      for(let i=0; i<totalRuns; i++){
        if(arStopping) break;

        const costNow = stage.type==='raid' ? 30 : 10;
        if(state.stamina < costNow){
          showToast(`⚡ พลังกายไม่พอ! ออโต้หยุดที่รอบ ${i+1}`);
          break;
        }

        // อัปเดต UI รอบ
        overlay.querySelector('#arRound').textContent = i+1;
        overlay.querySelector('#arTotal').textContent = totalRuns;
        overlay.querySelector('#arBarFill').style.width = `${(i/totalRuns)*100}%`;

        // จำลองการต่อสู้ (fast sim ไม่ render)
        const result = simulateBattleFast(stage, costNow);

        if(result.win){
          totalGold += result.gold;
          totalGem  += result.gem;
          totalExp  += result.exp;
          totalDrop += result.drop ? 1 : 0;
          totalHero += result.heroDropped ? 1 : 0;

          // อัปเดต state
          state.gold += result.gold;
          state.gem  += result.gem;
          state.team.filter(Boolean).forEach(uid=>{
            const u = getUnit(uid);
            const cap = levelCapForUnit(u);
            if(u.level >= cap) return;
            u.exp += result.exp;
            while(u.exp >= expToNext(u.level) && u.level < cap){ u.exp -= expToNext(u.level); u.level++; }
            if(u.level >= cap) u.exp = 0;
          });
          if(result.drop){
            state.inventory[result.drop.id] = (state.inventory[result.drop.id]||0)+1;
          }
          if(result.heroDropped){
            if(result.heroDropped === 'ainz_item'){
              state.inventory['ainz_killer_shard'] = (state.inventory['ainz_killer_shard']||0)+1;
              state.inventory['diamond_violet'] = (state.inventory['diamond_violet']||0)+1;
            } else if(result.heroDropped === 'sukuna_finger'){
              state.inventory['sukuna_finger'] = (state.inventory['sukuna_finger']||0)+1;
            } else if(result.heroDropped.startsWith && result.heroDropped.startsWith('diamond_')){
              state.inventory[result.heroDropped] = (state.inventory[result.heroDropped]||0)+1;
            } else {
              const bossDef2 = heroDef(stage.enemies[0]);
              let existing2 = state.roster.find(r=>r.heroId===bossDef2.id);
              if(existing2){ existing2.dupes++; if(existing2.dupes%3===0 && existing2.form<bossDef2.forms.length-1) existing2.form++; }
              else addStarterHero(bossDef2.id, 0);
            }
          }
        }

        // อัปเดตสถิติใน UI
        overlay.querySelector('#arGold').textContent = totalGold.toLocaleString();
        overlay.querySelector('#arGem').textContent  = totalGem;
        overlay.querySelector('#arExp').textContent  = totalExp.toLocaleString();
        overlay.querySelector('#arDrop').textContent = totalDrop;
        if(overlay.querySelector('#arHero')) overlay.querySelector('#arHero').textContent = totalHero;

        updateTopbar();
        await sleep(180); // หน่วงนิดหนึ่งให้ดูสวย
      }

      // จบออโต้
      overlay.querySelector('#arBarFill').style.width = '100%';
      arRunning = false;
      arBtn.classList.remove('running');
      arBtn.textContent = '✅ เสร็จแล้ว — กลับหน้าด่าน';
      arBtn.disabled = false;
      arBtn.onclick = ()=>{ overlay.remove(); activeTab='stages'; render(); };

      // ปลดล็อคปุ่มปิด
      const closeBtn = overlay.querySelector('#resultClose');
      if(closeBtn) closeBtn.disabled = false;

      showToast(`🔁 ออโต้เสร็จ! รับ 🪙${totalGold.toLocaleString()} 💎${totalGem} EXP${totalExp.toLocaleString()} รวม ${Math.round(arRepeatCount-(arStopping?0:0))} รอบ`);
    };
  } else {
    const overlay = document.createElement('div');
    overlay.className='modal-overlay';
    overlay.innerHTML = `
      <div class="modal" style="text-align:center;">
        <h3>💔 พ่ายแพ้</h3>
        <div style="font-size:48px;">😢</div>
        <p>ทีมของคุณพ่ายแพ้... ลองอัปเกรดฮีโร่หรือเปลี่ยนทีมแล้วลองใหม่!</p>
        <button class="btn" id="resultClose2" style="margin-top:10px;">ตกลง</button>
      </div>
    `;
    document.body.appendChild(overlay);
    overlay.querySelector('#resultClose2').onclick = ()=>{ overlay.remove(); activeTab='stages'; render(); };
  }
  updateTopbar();
}

let rosterFilter = 'all';
function renderRoster(){
  const filters = [['all','ทั้งหมด'],['common','Common'],['rare','Rare'],['epic','Epic'],['legendary','Legendary'],['mythic','★★★★★ Mythic']];
  content.innerHTML = `
    <h2 class="section-title">📖 คลังฮีโร่ (${state.roster.length})</h2>
    <div class="btn-row" style="margin-bottom:10px;">
      ${filters.map(([k,l])=>`<button class="btn ${rosterFilter===k?'':'secondary'}" data-filter="${k}" style="padding:6px 10px; font-size:11px;">${l}</button>`).join('')}
    </div>
    <div class="grid" id="rosterGrid"></div>
  `;
  content.querySelectorAll('[data-filter]').forEach(b=> b.onclick=()=>{ rosterFilter=b.dataset.filter; renderRoster(); });

  const list = state.roster.filter(u=> rosterFilter==='all' || heroDef(u.heroId).rarity===rosterFilter)
    .sort((a,b)=> RARITY[heroDef(b.heroId).rarity].stars - RARITY[heroDef(a.heroId).rarity].stars);

  document.getElementById('rosterGrid').innerHTML = list.map(u=>{
    const def = heroDef(u.heroId);
    const form = def.forms[u.form];
    return `
      <div class="hero-tile rarity-${def.rarity}" data-uid="${u.uid}">
        <span class="hero-stars">${'★'.repeat(RARITY[def.rarity].stars)}</span>
        <span class="hero-lvl">Lv.${u.level}</span>
        <div class="hero-emoji">${form.emoji}</div>
        <div class="hero-name">${form.name}</div>
      </div>
    `;
  }).join('') || '<p class="small-muted">ยังไม่มีฮีโร่ในหมวดนี้</p>';

  content.querySelectorAll('[data-uid]').forEach(el=>{
    el.onclick = ()=> openHeroDetail(el.dataset.uid);
  });
}

    <div class="modal">

      <div style="text-align:center;">
        <div style="font-size:64px;">${form.emoji}</div>
        <h3>${form.name} <span class="rarity-badge rarity-${def.rarity}">${RARITY[def.rarity].label}</span></h3>
        <div class="small-muted">${'★'.repeat(RARITY[def.rarity].stars)} • ธาตุ: ${ELEMENT_LABEL[displayElement]||displayElement} • ร่างที่ ${u.form+1}/${def.forms.length}</div>
        ${def.isSukuna ? `<div style="margin-top:4px;"><span class="ur-badge">EVO ${u.evo||0} / 3</span></div>` : ''}
      </div>
      <div class="card" style="margin-top:10px;">
        <div class="row-between"><b>Level ${u.level} / ${cap}</b><span class="small-muted">EXP ${u.exp}/${atCap?'MAX':nextExp}</span></div>
        <div class="bar-bg"><div class="bar-fill bar-xp" style="width:${atCap?100:(u.exp/nextExp*100)}%"></div></div>
        ${atCap ? `<div class="small-muted" style="color:var(--gold); margin-top:4px;">⚠️ ถึงขีดจำกัดเลเวล! ต้องทำ Level Break เพื่อเพิ่มต่อ</div>` : ''}
        <div class="row-between" style="margin-top:8px;"><span>❤️ HP</span><b>${stats.maxhp}</b></div>
        <div class="row-between"><span>⚔️ ATK</span><b>${stats.atk}</b></div>
        <div class="row-between"><span>🛡️ DEF</span><b>${stats.def}</b></div>
        <div class="row-between"><span>💨 SPD</span><b>${stats.spd}</b></div>
      </div>
      <div class="skill-card">
        <b>${displaySkill.name}</b>
        <div class="small-muted">${displaySkill.desc}</div>
        <div class="small-muted">MP cost: ${displaySkill.cost}</div>
      </div>
      ${displaySkill2 ? `
      <div class="skill-card">
        <b>${displaySkill2.name}</b>
        <div class="small-muted">${displaySkill2.desc}</div>
        <div class="small-muted">MP cost: ${displaySkill2.cost}</div>
      </div>` : ''}
      ${displaySkill3 ? `
      <div class="skill-card">
        <b>${displaySkill3.name}</b>
        <div class="small-muted">${displaySkill3.desc}</div>
        <div class="small-muted">MP cost: ${displaySkill3.cost}</div>

            <button class="btn secondary" id="lvlUp100" ${rem<1?'disabled':''} style="flex:1; min-width:80px; font-size:11px;">

    if(anchor) renderSukunaEvoPanel(u, anchor);
  }

  overlay.querySelector('#closeDetail').onclick = ()=>{ overlay.remove(); };
  overlay.onclick = (e)=>{ if(e.target===overlay) overlay.remove(); };

  function doLevelUp(times){
    const cap2 = levelCapForUnit(u);
    const canUp = Math.min(times, cap2 - u.level);
    if(canUp <= 0){ showToast("ถึงขีดจำกัดเลเวลแล้ว! ต้องทำ Level Break ก่อน"); return; }
    const totalCost = calcLevelUpCost(u.level, canUp);
    if(state.gold < totalCost){ showToast(`Gold ไม่พอ! ต้องการ 🪙 ${fmt(totalCost)}`); return; }
    state.gold -= totalCost;
    u.level += canUp;
    if(u.level >= cap2) u.exp = 0;
    showToast(`${form.name} เพิ่มเป็น Lv.${u.level}! (🪙 -${fmt(totalCost)})`);
    overlay.remove(); openHeroDetail(uid); updateTopbar();
  }

  overlay.querySelector('#lvlUp1').onclick = ()=> doLevelUp(1);
  overlay.querySelector('#lvlUp10').onclick = ()=> doLevelUp(10);
  overlay.querySelector('#lvlUp100').onclick = ()=> doLevelUp(100);

  const lbBtn = overlay.querySelector('#levelBreakBtn');
  if(lbBtn) lbBtn.onclick = ()=>{
    const cap2 = levelCapForUnit(u);
    const cost2 = LEVEL_BREAK_COST[cap2];
    if(!cost2){ showToast("Level Break สูงสุดแล้ว!"); return; }
    if(state.gold < cost2.gold){ showToast(`Gold ไม่พอ! ต้องการ 🪙 ${cost2.gold}`); return; }
    if(state.gem < cost2.gem){ showToast(`Gem ไม่พอ! ต้องการ 💎 ${cost2.gem}`); return; }
    state.gold -= cost2.gold;
    state.gem -= cost2.gem;
    u.levelBreak = (u.levelBreak||0) + 1;
    const newCap = levelCapForUnit(u);
    showToast(`🔓 Level Break! ขีดจำกัดใหม่ Lv.${newCap}!`);
    overlay.remove(); openHeroDetail(uid); updateTopbar();
  };

  overlay.querySelectorAll('[data-slot]').forEach(slotEl=>{
    slotEl.onclick = ()=> openEquipPicker(uid, slotEl.dataset.slot, overlay);
  });
}

function openEquipPicker(uid, slot, parentOverlay){
  const u = getUnit(uid);
  const owned = EQUIP_DB.filter(e=> e.slot===slot && (state.inventory[e.id]||0)>0);
  const overlay = document.createElement('div');
  overlay.className='modal-overlay';
  overlay.style.zIndex=900;
  overlay.innerHTML = `
    <div class="modal">
      <span class="modal-close" id="closeEquip">✕</span>
      <h3>เลือกอุปกรณ์ (${slot})</h3>
      ${u.equip[slot] ? `<div class="skill-card" data-unequip="1">❌ ถอดอุปกรณ์ปัจจุบัน</div>`:''}
      ${owned.length? owned.map(e=>`
        <div class="skill-card" data-equip="${e.id}">
          <b>${e.emoji} ${e.name}</b> <span class="rarity-badge rarity-${e.rarity}">${RARITY[e.rarity].label}</span>
          <div class="small-muted">${Object.entries(e.bonus).map(([k,v])=>`${k.toUpperCase()} +${v}`).join(', ')} • คงเหลือ ${state.inventory[e.id]}</div>
        </div>
      `).join('') : '<p class="small-muted">ไม่มีอุปกรณ์ในคลังสำหรับช่องนี้ (ลองตีด่านเพื่อหาดรอป!)</p>'}
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector('#closeEquip').onclick = ()=> overlay.remove();
  overlay.onclick=(e)=>{ if(e.target===overlay) overlay.remove(); };
  const unequip = overlay.querySelector('[data-unequip]');
  if(unequip) unequip.onclick = ()=>{
    state.inventory[u.equip[slot]] = (state.inventory[u.equip[slot]]||0)+1;
    u.equip[slot]=null;
    overlay.remove(); parentOverlay.remove(); openHeroDetail(uid);
  };
  overlay.querySelectorAll('[data-equip]').forEach(el=>{
    el.onclick = ()=>{
      const eid = el.dataset.equip;
      if(u.equip[slot]) state.inventory[u.equip[slot]] = (state.inventory[u.equip[slot]]||0)+1;
      u.equip[slot]=eid;
      state.inventory[eid]--;
      overlay.remove(); parentOverlay.remove(); openHeroDetail(uid);
    };
  });
}

function renderTeam(){
  content.innerHTML = `
    <h2 class="section-title">🛡️ จัดทีม (สูงสุด 6 ตัว)</h2>

  slotsEl.innerHTML = state.team.map((uid,i)=>{
    if(!uid) return `<div class="team-slot" data-slot="${i}">➕</div>`;
    const u = getUnit(uid); const def = heroDef(u.heroId); const form = def.forms[u.form];
    return `<div class="hero-tile filled rarity-${def.rarity} team-slot filled" data-slot="${i}" data-uid="${uid}">
      <span class="hero-stars">${'★'.repeat(RARITY[def.rarity].stars)}</span>
      <span class="hero-lvl">Lv.${u.level}</span>
      <div class="hero-emoji">${form.emoji}</div>
      <div class="hero-name">${form.name}</div>
    </div>`;
  }).join('');

  slotsEl.querySelectorAll('[data-slot]').forEach(el=>{
    el.onclick = ()=>{
      const i = parseInt(el.dataset.slot);
      if(state.team[i]){ state.team[i]=null; renderTeam(); }
    };
  });

  const bench = state.roster.filter(u=> !state.team.includes(u.uid));
  document.getElementById('benchGrid').innerHTML = bench.map(u=>{
    const def = heroDef(u.heroId); const form = def.forms[u.form];
    return `<div class="hero-tile rarity-${def.rarity}" data-bench="${u.uid}">
      <span class="hero-stars">${'★'.repeat(RARITY[def.rarity].stars)}</span>
      <span class="hero-lvl">Lv.${u.level}</span>
      <div class="hero-emoji">${form.emoji}</div>
      <div class="hero-name">${form.name}</div>
    </div>`;
  }).join('') || '<p class="small-muted">ฮีโร่ทุกตัวอยู่ในทีมแล้ว</p>';

  document.querySelectorAll('[data-bench]').forEach(el=>{
    el.onclick = ()=>{
      const emptyIdx = state.team.findIndex(s=>s===null);
      if(emptyIdx===-1){ showToast("ทีมเต็มแล้ว (6 ตัว) — เอาตัวออกก่อน"); return; }
      state.team[emptyIdx] = el.dataset.bench;
      renderTeam();
    };
  });

  // === ดูระบบฟิวชันได้ที่แท็บ ✨ฟิวชัน ===
  const fusionHint = document.createElement('p');
  fusionHint.style.cssText = 'text-align:center; color:#ffcc00; margin-top:16px; font-size:13px; opacity:0.8;';
  fusionHint.innerHTML = '✨ ระบบฟิวชัน → กดแท็บ <b>ฟิวชัน</b> ด้านล่าง';
  content.appendChild(fusionHint);
}

function hasFusionHeroes(){
  const inRoster = (id) => state.roster.find(r=>r.heroId===id);
  return inRoster('db_goku') && inRoster('db_vegeta');
}
function hasFusionInTeam(){
  const teamHeroIds = state.team.filter(Boolean).map(uid=>{ const u=getUnit(uid); return u?heroDef(u.heroId).id:''; });
  return teamHeroIds.includes('db_goku') && teamHeroIds.includes('db_vegeta');
}
function getFusionHero(fusionType){
  return state.roster.find(r=>r.heroId === (fusionType==='vegito'?'db_vegito':'db_gogeta'));
}
// Generic check: does roster contain ALL required ingredient heroes for a fusion def?
function hasAllFusionIngredients(fusionDef){
  return fusionDef.fusionRequires.every(id => !!state.roster.find(r=>r.heroId===id));
}
function hasYoriichiIngredients(){
  return hasAllFusionIngredients(heroDef('ds_yoriichi'));
}
function hasYoriichiInTeam(){
  const yoriDef = heroDef('ds_yoriichi');
  const teamHeroIds = state.team.filter(Boolean).map(uid=>{ const u=getUnit(uid); return u?heroDef(u.heroId).id:''; });
  return yoriDef.fusionRequires.every(id => teamHeroIds.includes(id));
}

/* ============================================================

function countHeroInRoster(heroId){
  // นับตัวหลัก + dupes ทั้งหมด (dupe แต่ละชิ้นถือเป็น 1 ตัว)
  return state.roster.filter(r=>r.heroId===heroId).reduce((sum, r)=> sum + 1 + (r.dupes||0), 0);
}

// วางไว้ใกล้ๆ countHeroInRoster เลย
function consumeHero(heroId, needed){
  let remaining = needed;
  for(let i = state.roster.length-1; i >= 0 && remaining > 0; i--){
    const r = state.roster[i];
    if(r.heroId !== heroId) continue;
    const available = 1 + (r.dupes||0);
    if(available <= remaining){
      const uid = r.uid;
      for(let s=0;s<state.team.length;s++){ if(state.team[s]===uid) state.team[s]=null; }
      state.roster.splice(i,1);
      remaining -= available;
    } else {
      r.dupes -= (remaining - 1);
      remaining = 0;
    }
  }
}
function hasSukunaIngredients(){
  return countHeroInRoster('jjk_yuji') >= 7 && countHeroInRoster('jjk_megumi') >= 7;

function doSukunaFusion(){
  const id = 'jjk_sukuna';
  const def = heroDef(id);
  if(countHeroInRoster('jjk_yuji') < 7){ showToast("ต้องการ ยูจิ 7 ตัวในคลัง!"); return; }
  if(countHeroInRoster('jjk_megumi') < 7){ showToast("ต้องการ เมงุมิ 7 ตัวในคลัง!"); return; }

  showConfirm(
    `ใช้ Fusion สร้าง "${def.emoji} ${def.name}"?\n<b style="color:#ff8888;">ยูจิ 7 ตัว + เมงุมิ 7 ตัว จะถูกใช้ไปในการหลอมรวม (หายจากคลัง)</b>\nซุคุนะ UR จะถูกเพิ่มในคลัง!`,
    ()=>{
      // ลบ ยูจิ 7 ตัว (นับ dupes)
      consumeHero('jjk_yuji', 7);
      // ลบ เมงุมิ 7 ตัว (นับ dupes)
      consumeHero('jjk_megumi', 7);
      const existing = state.roster.find(r=>r.heroId===id);
      if(existing){
        existing.dupes++;
        if(existing.dupes % 3 === 0 && existing.form < def.forms.length-1) existing.form++;
        showToast(`👹 ซุคุนะ UR ได้รับ Dupe! (${existing.dupes} dupes) — พลังเพิ่มขึ้น!`);
      } else {
        addStarterHero(id, 0);
        showToast(`👹🔴🌑 ริวโอเมน ซุคุนะ UR ปลดล็อกสำเร็จ!! ราชาแห่งคำสาปปรากฏตัว!`);
      }
      if(activeTab==='fusion') renderFusionTab(); else renderTeam();
    }
  );
}

   SUKUNA UR — EVO SYSTEM (เฉพาะ UR เท่านั้น)
   3 ธาตุประจำร่าง: EVO0 มืด 🌑 → EVO1 ไฟ 🔥 → EVO2 แสง ✨

   ต้องใช้ 🩸 นิ้วซุคุนะ (ดรอปจาก raid-sukuna-1 เท่านั้น 4%) — ของยากมาก!
   ============================================================ */
const SUKUNA_EVO = [
  null, // evo 0 = ร่างเริ่มต้น "ในร่างยูจิ" (ธาตุมืด 🌑) — ไม่มีข้อมูล evo

  }

function sukunaUnit(){
  return state.roster.find(r=>r.heroId==='jjk_sukuna');
}

function canEvoSukuna(stage){
  const u = sukunaUnit();
  if(!u) return false;
  if((u.evo||0) !== stage-1) return false; // ต้องอยู่ขั้นก่อนหน้าพอดี
  const req = SUKUNA_EVO[stage].require;
  const baseOk = countHeroInRoster('jjk_yuji') >= req.yuji
    && countHeroInRoster('jjk_megumi') >= req.megumi
    && state.gold >= req.gold
    && state.gem >= req.gem
    && (state.inventory['sukuna_finger']||0) >= req.sukuna_finger;
  if(!baseOk) return false;
  // EVO3 ตรวจสอบ มโหรากา + ล้อมโหรากา
  if(req.mahoraga && countHeroInRoster('jjk_mahoraga') < req.mahoraga) return false;
  if(req.mahoraga_wheel && (state.inventory['mahoraga_wheel']||0) < req.mahoraga_wheel) return false;
  return true;
}

function renderSukunaEvoPanel(unitOverride, container){
  // unitOverride = unit object (ส่งมาจาก openHeroDetail)
  // container = DOM element ที่จะ append panel เข้าไป
  const u = unitOverride || sukunaUnit();
  if(!u) return;

  const def = heroDef(u.heroId);
  if(!def.evoForms) return; // ไม่มีระบบ EVO

  // ลบ panel เก่าถ้ามี (ใน container เดียวกัน)
  container.querySelectorAll('.ur-evo-panel').forEach(el=>el.remove());

  const curEvo = u.evo || 0;
  const maxEvo = def.evoForms.length - 1; // EVO สูงสุด = จำนวน evoForms - 1

  const mahoragaCount = countHeroInRoster('jjk_mahoraga');
  const mahoragaWheelCount = state.inventory['mahoraga_wheel']||0;

  const ELEMENT_COLORS = {dark:'#aa66ff', fire:'#ff6644', light:'#ffee88', void:'#9944ff'};
