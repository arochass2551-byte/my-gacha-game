      ปลุกพลัง UR ให้แข็งแกร่งขึ้น! แต่ละขั้นเปลี่ยนธาตุและสกิลทั้งหมด
      <br>ขั้นปัจจุบัน: <b style="color:var(--ur);">EVO ${curEvo} / ${maxEvo}</b>
      — ${curEvo===0
          ? (def.evoForms[0]?.elementLabel ? def.evoForms[0].elementLabel+' '+def.evoForms[0].name : '🌑 ร่างเริ่มต้น')
          : (SUKUNA_EVO[curEvo]?.elementLabel+' '+SUKUNA_EVO[curEvo]?.name)}

    <div style="background:rgba(255,42,109,0.12); border:1px solid rgba(255,42,109,0.4); border-radius:8px; padding:6px 8px; margin-bottom:10px;">
      <div style="font-size:10px; color:#ff99bb;">
        🩸 <b>นิ้วซุคุนะ</b> (EVO1/2): <b style="color:${fingerCount>0?'#9dff9d':'#ff6666'};">${fingerCount}</b> ชิ้น — ดรอปจาก <b style="color:#ff6644;">เรดบอส Malevolent Shrine</b> (4%)
        <br>🐉 <b>มโหรากา UR</b> (EVO3): <b style="color:${mahoragaCount>0?'#9dff9d':'#ff6666'};">${mahoragaCount}</b> ตัว — ดรอปจาก <b style="color:#9944ff;">เรดบอส มโหรากา</b> (2%)
        <br>⚙️ <b>ล้อมโหรากา</b> (EVO3): <b style="color:${mahoragaWheelCount>0?'#9dff9d':'#ff6666'};">${mahoragaWheelCount}</b> ชิ้น — ดรอปจาก <b style="color:#9944ff;">เรดบอส ซุคุนะ+มโหรากา</b> (2%)
      </div>
    </div>
  `;

  for(let stage=1; stage<=maxEvo; stage++){
    const evoDef = SUKUNA_EVO[stage];
    if(!evoDef) continue;
    const done = curEvo >= stage;
    const locked = curEvo < stage-1;
    const ready = canEvoSukuna(stage);

    const isEvo3 = stage === 3;

    html += `
      <div style="background:rgba(0,0,0,0.45); border-radius:10px; padding:10px; margin-bottom:10px;
        border:2px solid ${done?ec:(locked?'#555':'#ff6644')}; ${done?`box-shadow:0 0 14px ${ec}99;`:''}">
        <div style="display:flex; align-items:center; gap:10px;">
          <div style="font-size:36px;">${evoDef.emoji}</div>
          <div style="flex:1;">
            <div style="font-size:12px; font-weight:800; color:${done?ec:'#ffaa88'};">EVO ${stage} — ${evoDef.name}</div>
            <div style="font-size:10px; font-weight:700; color:${ec}; margin-top:2px;">ธาตุ: ${evoDef.elementLabel}</div>
            <div style="font-size:10px; color:#ffaa88; margin-top:2px;">${evoDef.desc}</div>
            <div style="font-size:10px; color:var(--ur); font-weight:700; margin-top:3px;">${evoDef.statBonus}</div>
          </div>
        </div>
        ${done
          ? `<div style="color:#9dff9d; font-size:11px; text-align:center; margin-top:8px;">✅ ปลดล็อก EVO ${stage} แล้ว! (${evoDef.elementLabel})</div>`
          : locked
            ? `<div style="color:#888; font-size:11px; text-align:center; margin-top:8px;">🔒 ต้องทำ EVO ${stage-1} ก่อน</div>`
            : `
              <div style="display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin:8px 0;">
                <span style="font-size:10px; background:rgba(0,0,0,0.4); padding:3px 8px; border-radius:6px; color:${yujiCount>=evoDef.require.yuji?'#9dff9d':'#ff6666'};">
                  🩸👊 ยูจิ ${yujiCount}/${evoDef.require.yuji}
                </span>
                <span style="font-size:10px; background:rgba(0,0,0,0.4); padding:3px 8px; border-radius:6px; color:${megumiCount>=evoDef.require.megumi?'#9dff9d':'#ff6666'};">
                  🐺🌑 เมงุมิ ${megumiCount}/${evoDef.require.megumi}
                </span>
                <span style="font-size:10px; background:rgba(0,0,0,0.4); padding:3px 8px; border-radius:6px; color:${fingerCount>=evoDef.require.sukuna_finger?'#9dff9d':'#ff6666'};">
                  🩸👹 นิ้ว ${fingerCount}/${evoDef.require.sukuna_finger}
                </span>
                ${isEvo3 ? `
                <span style="font-size:10px; background:rgba(80,0,180,0.4); padding:3px 8px; border-radius:6px; border:1px solid #7744cc; color:${mahoragaCount>=(evoDef.require.mahoraga||0)?'#9dff9d':'#ff6666'};">
                  🐉 มโหรากา ${mahoragaCount}/${evoDef.require.mahoraga||1}
                </span>
                <span style="font-size:10px; background:rgba(80,0,180,0.4); padding:3px 8px; border-radius:6px; border:1px solid #7744cc; color:${mahoragaWheelCount>=(evoDef.require.mahoraga_wheel||0)?'#9dff9d':'#ff6666'};">

                </span>` : ''}
                <span style="font-size:10px; background:rgba(0,0,0,0.4); padding:3px 8px; border-radius:6px; color:${state.gold>=evoDef.require.gold?'#9dff9d':'#ff6666'};">
                  🪙 ${fmt(evoDef.require.gold)}
                </span>
                <span style="font-size:10px; background:rgba(0,0,0,0.4); padding:3px 8px; border-radius:6px; color:${state.gem>=evoDef.require.gem?'#9dff9d':'#ff6666'};">
                  💎 ${fmt(evoDef.require.gem)}

  panel.innerHTML = html;

  panel.querySelectorAll('.ur-evo-btn').forEach(btn=>{

function doSukunaEvo(stage, onDone){
  const u = sukunaUnit();
  if(!u){ showToast("ต้อง Fusion ซุคุนะ UR ก่อน!"); return; }
  if(!canEvoSukuna(stage)){ showToast("วัตถุดิบหรือทรัพยากรไม่พอสำหรับ EVO นี้!"); return; }
  const evoDef = SUKUNA_EVO[stage];

  showConfirm(
    `ปลุกพลัง <b style="color:var(--ur);">EVO ${stage} — ${evoDef.name}</b> (ธาตุ ${evoDef.elementLabel})?\n` +
    `<b style="color:#ff8888;">ใช้ ยูจิ ${evoDef.require.yuji} ตัว + เมงุมิ ${evoDef.require.megumi} ตัว + 🩸นิ้วซุคุนะ ${evoDef.require.sukuna_finger} + 🪙${fmt(evoDef.require.gold)} + 💎${fmt(evoDef.require.gem)}</b>\n` +
    `ซุคุนะ UR จะแข็งแกร่งขึ้น ${evoDef.statBonus} และเปลี่ยนสกิลทั้งหมด!`,
    ()=>{
      // หักวัตถุดิบ (ใช้ global consumeHero)
      consumeHero('jjk_yuji', evoDef.require.yuji);
      consumeHero('jjk_megumi', evoDef.require.megumi);
      state.gold -= evoDef.require.gold;
      state.gem  -= evoDef.require.gem;
      state.inventory['sukuna_finger'] = (state.inventory['sukuna_finger']||0) - evoDef.require.sukuna_finger;
      // EVO3: หักมโหรากาและล้อมโหรากาด้วย
      if(evoDef.require.mahoraga){
        consumeHero('jjk_mahoraga', evoDef.require.mahoraga);
      }
      if(evoDef.require.mahoraga_wheel){
        state.inventory['mahoraga_wheel'] = (state.inventory['mahoraga_wheel']||0) - evoDef.require.mahoraga_wheel;
      }
      u.evo = stage;
      // ปรับร่างที่แสดงให้ตรงกับ EVO ถ้า EVO สูงกว่าร่างปัจจุบัน
      if(u.form < stage && stage <= heroDef('jjk_sukuna').forms.length-1){
        u.form = stage;
      }
      showToast(`🌀👹 ซุคุนะ UR ปลุกพลัง EVO ${stage} สำเร็จ!! ${evoDef.elementLabel} ${evoDef.name}! สกิลเปลี่ยนใหม่ทั้งหมด!`);
      updateTopbar();
      if(typeof onDone === 'function'){
        onDone(); // refresh panel ใน modal
      } else {
        if(activeTab==='fusion') renderFusionTab(); else renderTeam();
      }
    }
  );
}



/* ---------- PLAYER PROFILES (Local) ---------- */
const PROFILES_KEY = "hero_collector_profiles_v1";
let currentProfile = null;

function getProfiles(){
  try{ return JSON.parse(localStorage.getItem(PROFILES_KEY) || "[]"); }catch(e){ return []; }
}
function saveProfiles(list){
  try{ localStorage.setItem(PROFILES_KEY, JSON.stringify(list)); }catch(e){}
}
function addProfile(name){
  const list = getProfiles();
  if(!list.includes(name)){ list.push(name); saveProfiles(list); }
}
function deleteProfile(name){
  saveProfiles(getProfiles().filter(p=>p!==name));
  localStorage.removeItem(getSaveKeyFor(name));
}

/* ---------- SAVE / LOAD ---------- */
const SAVE_KEY_BASE = "hero_collector_save_v1";
function getSaveKeyFor(profile){ return SAVE_KEY_BASE + "__" + profile; }
function getSaveKey(){ return getSaveKeyFor(currentProfile); }

function saveGame(silent){
  if(!currentProfile) return;
  try{
    const ind = document.getElementById('autosave-indicator');
    if(ind){ ind.className='saving'; ind.textContent='💾 กำลังเซฟ...'; }
    localStorage.setItem(getSaveKey(), JSON.stringify(state));
    if(!silent) showToast("💾 บันทึกเกมเรียบร้อย!");
    if(ind){
      setTimeout(()=>{
        ind.className='saved';
        const now = new Date();
        ind.textContent='✅ เซฟแล้ว ' + now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0') + ':' + now.getSeconds().toString().padStart(2,'0');
        setTimeout(()=>{ ind.className=''; }, 3000);
      }, 300);
    }
  }catch(e){
    showToast("บันทึกไม่สำเร็จ");
    const ind = document.getElementById('autosave-indicator');
    if(ind){ ind.className=''; ind.textContent='❌ เซฟไม่ได้'; }
  }
}

function loadGame(){
  try{
    const raw = localStorage.getItem(getSaveKey());
    if(!raw) return false;
    const loaded = JSON.parse(raw);
    state = loaded;
    // === อัพเดทค่าจากโค้ดล่าสุดทุกครั้งที่โหลดเซฟ ===
    // ค่าพลังกายสูงสุด
    state.staminaMax = 550;
    if(state.stamina > state.staminaMax) state.stamina = state.staminaMax;
    // เพิ่ม field ใหม่ที่อาจไม่มีในเซฟเก่า
    if(!state.inventory) state.inventory = {};
    if(!state.clearedStages) state.clearedStages = {};
    if(!state.team) state.team = [null,null,null,null,null,null];
    if(!state.pity) state.pity = {};
    BANNERS.forEach(b=>{ if(state.pity[b.id]==null) state.pity[b.id]=0; });
    // อัปเดตคลัง Ainz item field
    if(!state.inventory) state.inventory = {};
    if(state.inventory['ainz_killer_shard'] == null) state.inventory['ainz_killer_shard'] = 0;
    // อัปเดตคลัง เพชร 7 สี
    ['diamond_red','diamond_orange','diamond_yellow','diamond_green','diamond_blue','diamond_indigo','diamond_violet'].forEach(id=>{
      if(state.inventory[id] == null) state.inventory[id] = 0;
    });
    // อัปเดตคลัง นิ้วซุคุนะ (วัตถุดิบ EVO ซุคุนะ UR)
    if(state.inventory['sukuna_finger'] == null) state.inventory['sukuna_finger'] = 0;
    // อัปเดตคลัง ล้อมโหรากา (วัตถุดิบ EVO3 ซุคุนะ UR)
    if(state.inventory['mahoraga_wheel'] == null) state.inventory['mahoraga_wheel'] = 0;
    // migrate roster units missing evo field
    state.roster.forEach(u=>{ if(u.evo == null) u.evo = 0; });
    // ===================================================
    return true;
  }catch(e){ return false; }
}

function hasSave(){
  return !!localStorage.getItem(getSaveKey());
}

document.getElementById('saveBtn').onclick = ()=> saveGame(false);
document.getElementById('logoutBtn').onclick = ()=>{
  showConfirm("ออกจากไอดีปัจจุบัน? เกมจะบันทึกให้อัตโนมัติก่อนออก", ()=>{
    saveGame(true);
    currentProfile = null;
    document.getElementById('playerTag').textContent = "";
    showProfileScreen();
  });
};

/* ---------- PROFILE SELECT SCREEN ---------- */
function showProfileScreen(){
  const screen = document.getElementById('startScreen');
  const btns = document.getElementById('startBtns');
  const msg = document.getElementById('startMsg');
  screen.style.display = 'flex';
  document.getElementById('startTitle').textContent = "HERO COLLECTOR";
  document.getElementById('startSub').textContent = "เลือกหรือสร้างไอดีผู้เล่น";

  const profiles = getProfiles();
  btns.innerHTML = `
    ${profiles.map(p=>`
      <div class="btn-row" style="width:100%;">
        <button class="btn secondary" style="flex:1; text-align:left;" data-profile="${p}">👤 ${p}</button>
        <button class="btn danger" data-delprofile="${p}" style="flex:0 0 auto; padding:10px 12px;">🗑️</button>
      </div>
    `).join('')}
    <div style="display:flex; gap:6px; margin-top:6px;">
      <input id="newProfileName" type="text" placeholder="ชื่อไอดีใหม่..." maxlength="16"
        style="flex:1; border-radius:10px; border:none; padding:10px; font-size:13px; background:rgba(0,0,0,0.3); color:#fff;">
      <button class="btn" id="createProfile">➕ สร้าง</button>
    </div>
  `;
  msg.textContent = profiles.length ? "เลือกไอดีของคุณ หรือสร้างไอดีใหม่" : "ยังไม่มีไอดีผู้เล่น — สร้างไอดีแรกของคุณ!";

  btns.querySelectorAll('[data-profile]').forEach(el=>{
    el.onclick = ()=>{
      currentProfile = el.dataset.profile;
      showStartScreen();
    };
  });
  btns.querySelectorAll('[data-delprofile]').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      const name = el.dataset.delprofile;
      showConfirm(`ลบไอดี "${name}" และข้อมูลเซฟทั้งหมดของไอดีนี้? การลบนี้ไม่สามารถย้อนกลับได้`, ()=>{
        deleteProfile(name);
        showProfileScreen();
      });
    };
  });
  document.getElementById('createProfile').onclick = ()=>{
    const input = document.getElementById('newProfileName');
    const name = input.value.trim();
    if(!name){ showToast("กรุณาตั้งชื่อไอดีก่อน"); return; }
    if(getProfiles().includes(name)){ showToast("มีไอดีนี้อยู่แล้ว"); return; }
    addProfile(name);
    currentProfile = name;
    showStartScreen();
  };
}

/* ---------- START SCREEN ---------- */
function showStartScreen(){
  const screen = document.getElementById('startScreen');
  const btns = document.getElementById('startBtns');
  const msg = document.getElementById('startMsg');
  screen.style.display = 'flex';
  document.getElementById('startTitle').textContent = "HERO COLLECTOR";
  document.getElementById('startSub').textContent = `👤 ไอดี: ${currentProfile}`;

  const continueAvailable = hasSave();
  btns.innerHTML = `
    ${continueAvailable ? '<button class="btn" id="continueGame">▶️ เล่นต่อ (Continue)</button>' : ''}
    <button class="btn ${continueAvailable?'secondary':''}" id="newGame">🆕 เริ่มเกมใหม่</button>
    <button class="btn secondary" id="switchProfile">🔄 เปลี่ยนไอดีผู้เล่น</button>
  `;
  msg.textContent = continueAvailable ? "พบข้อมูลเซฟล่าสุด" : "ยังไม่มีข้อมูลเซฟ — เริ่มการเดินทางใหม่!";

  if(continueAvailable){
    document.getElementById('continueGame').onclick = ()=>{
      if(loadGame()){
        showToast("โหลดข้อมูลเรียบร้อย!");
      }
      enterGame();
    };
  }
  document.getElementById('newGame').onclick = ()=>{
    if(continueAvailable){
      showConfirm("เริ่มเกมใหม่จะลบข้อมูลเซฟเดิมของไอดีนี้ ต้องการดำเนินการต่อหรือไม่?", ()=>{
        localStorage.removeItem(getSaveKey());
        resetState();
        enterGame();
      });
      return;
    }
    resetState();
    enterGame();
  };
  document.getElementById('switchProfile').onclick = ()=>{
    currentProfile = null;
    showProfileScreen();
  };
}

function enterGame(){
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('playerTag').textContent = "👤 " + currentProfile;
  activeTab = 'home';
  render();
}

function resetState(){
  state = {
    gem: 1500, gold: 2000, stamina: 400, staminaMax: 550,
    pity:{}, roster:[], team:[null,null,null,null,null,null],
    clearedStages:{}, inventory:{},
  };
  BANNERS.forEach(b=> state.pity[b.id]=0);
  addStarterHero("h_swordling");
  addStarterHero("h_archerling");
  addStarterHero("h_shieldling");
  addStarterHero("h_healthling");
  state.team[0]=state.roster[0].uid;
  state.team[1]=state.roster[1].uid;
  state.team[2]=state.roster[2].uid;
  state.team[3]=state.roster[3].uid;
}

/* ---------- INIT ---------- */
showProfileScreen();

// passive stamina regen (every 20s, +1, for demo purposes)
setInterval(()=>{
  if(state.stamina < state.staminaMax){ state.stamina++; updateTopbar(); }
}, 20000);

// autosave every 10s
const AUTOSAVE_INTERVAL = 10;
let autosaveCountdown = AUTOSAVE_INTERVAL;
setInterval(()=>{
  autosaveCountdown--;
  const ind = document.getElementById('autosave-indicator');
  if(ind && !ind.classList.contains('saving') && !ind.classList.contains('saved')){
    ind.textContent = '💾 เซฟใน ' + autosaveCountdown + 's';
  }
  if(autosaveCountdown <= 0){
    autosaveCountdown = AUTOSAVE_INTERVAL;
    saveGame(true);
  }
}, 1000);
window.addEventListener('beforeunload', ()=> saveGame(true));
</script>
</body>
